name: eval-04-rationale-block
skill: electrical/small-power
description: |
  WI2 rationale block compliance: chat_summary ≤500 chars and 8 sections in the exact
  order Jurisdiction-Supply / Circuit-Topology / Special-Locations / RCD-Posture /
  OCPD-Cable / Diversity-Zs / Compliance-Assumptions / Drafting-References.
category: rationale_block
input_fixtures:
  - ../examples/uk-3bed-dwelling/output.json
  - ../examples/ke-nairobi-small-office/output.json
  - ../examples/intl-open-plan-floor/output.json
  - ../examples/us-residential-dwelling/output.json

checks:
  - assertion: "len(output.rationale.chat_summary) <= 500"
    description: chat_summary ≤500 chars
    severity: critical

  - assertion: "len(output.rationale.chat_summary) >= 40"
    description: chat_summary ≥40 chars (rationale schema minimum)
    severity: critical

  - assertion: "len(output.rationale.sections) == 8"
    description: 8 rationale sections
    severity: critical

  - assertion: "output.rationale.sections[0].title.startswith('Jurisdiction')"
    description: Section 1 title starts with 'Jurisdiction'
    severity: critical

  - assertion: "'Drafting' in output.rationale.sections[7].title"
    description: Section 8 title mentions 'Drafting'
    severity: critical

  - assertion: "all(len(s.summary) <= 400 for s in output.rationale.sections)"
    description: Each section.summary ≤400 chars (rationale schema enforces)
    severity: critical
