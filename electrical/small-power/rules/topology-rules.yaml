# Circuit topology rules for small-power per jurisdiction
# Consumed by validator (INV-04 checks) and engineer reasoning

rules:
  - id: TOP-01
    jurisdiction: [GB, KE]
    standard_reference: "IET On-Site Guide §8.4.4 (8th Edition)"
    rule_text: >
      A ring final circuit may not serve a floor area greater than 100 m². The floor
      area is calculated as the sum of the floor dimensions for all rooms declared in
      circuits[].rooms_covered. If the area exceeds 100 m², the ring must be split
      into two or more rings, each within the 100 m² limit, or replaced with radial
      circuits.
    applies_to: circuits
    enforcement: hard_fail

  - id: TOP-02
    jurisdiction: [GB, KE]
    standard_reference: "IET On-Site Guide §8.4.4 (8th Edition)"
    rule_text: >
      The total number of non-fused spur connections on any one leg of a ring final
      circuit must not exceed 2. A spur is defined as a branch cable connected at one
      point to the ring conductors. Fused connection units (FCUs) may feed additional
      loads beyond the spur limit but must be individually fused at ≤13 A.
    applies_to: circuits
    enforcement: warning

  - id: TOP-03
    jurisdiction: [all]
    standard_reference: "IET On-Site Guide §8.4.4 (GB/KE) / IEC 60364-1:2005 (INT/EU) / NEC 2023 (US)"
    rule_text: >
      The ring topology is only a valid selection for jurisdictions in {GB, KE}.
      KE is included because KS 1700:2018 §313 adopts BS 7671:2018+A2:2022 by
      reference, which in turn recognises ring final circuits. For INT, EU, and US
      jurisdictions, declaring topology=ring is a hard fail; the engineer must
      select radial or dedicated_radial.
    applies_to: circuits
    enforcement: hard_fail

  - id: TOP-04
    jurisdiction: [KE]
    standard_reference: "KS 1700:2018 §313 + local engineering practice"
    rule_text: >
      At commercial scale (floor area ≥80 m²), Kenyan engineering practice generally
      favours radial topology over ring final circuits because of the easier
      verification of Zs values, simpler extension, and reduced risk of shared-neutral
      problems in open-plan offices. Ring topology remains technically compliant; this
      rule raises an informational note to prompt the engineer's judgment.
    applies_to: circuits
    enforcement: info

  - id: TOP-05
    jurisdiction: [GB, KE]
    standard_reference: "BS 7671:2018+A2:2022 §433.1.4 + IET On-Site Guide §8.4.5"
    rule_text: >
      Cooker and range circuits must use dedicated_radial topology. The cooker circuit
      must not be shared with any socket-outlet circuit. A cooker control unit with an
      integral 13 A socket is permitted on the same circuit as the cooker, but no
      additional socket outlets may be connected to that circuit.
    applies_to: circuits
    enforcement: hard_fail

  - id: TOP-06
    jurisdiction: [GB, KE]
    standard_reference: "BS 7671:2018+A2:2022 §Section 554 (fixed water heaters)"
    rule_text: >
      Fixed water heaters and immersion heaters must be supplied by a dedicated_radial
      circuit. The circuit must be permanently connected (no plug/socket connection for
      heaters rated >3 kW). The isolator must be accessible to the user.
    applies_to: circuits
    enforcement: hard_fail

  - id: TOP-07
    jurisdiction: [US]
    standard_reference: "NEC 2023 Article 210 (branch circuits)"
    rule_text: >
      NEC does not recognise ring final circuits. All branch circuits must be radial
      (single-end-fed) or dedicated_radial. Declaring topology=ring for a US
      jurisdiction is a hard fail. Multi-wire branch circuits (shared neutral) are
      permitted per NEC 2023 Article 210.4 but require a 2-pole or 3-pole OCPD with
      simultaneous disconnect.
    applies_to: circuits
    enforcement: hard_fail

  - id: TOP-08
    jurisdiction: [INT, EU]
    standard_reference: "IEC 60364-1:2005 §131 (fundamental principles)"
    rule_text: >
      IEC 60364 series and European national standards derived from it (e.g., NF C 15-100,
      VDE 0100, CENELEC HD 60364) recognise only radial branch circuit topology.
      Ring final circuits are a UK/Commonwealth-specific arrangement not present in
      IEC 60364. Declaring topology=ring for INT or EU jurisdictions is a hard fail.
    applies_to: circuits
    enforcement: hard_fail

  - id: TOP-09
    jurisdiction: [GB, KE]
    standard_reference: "IET On-Site Guide §8.4.4 (8th Edition) + BS 7671:2018+A2:2022 §526 (top-level)"
    rule_text: >
      Ring final circuit continuity: when circuits[].topology == 'ring',
      both endpoints of the ring (endpoint_a_xy and endpoint_b_xy) MUST land
      at the same MCB way (mcb_way_id). A ring that lands at two different
      ways is structurally broken — the supply is then two radials sharing
      conductors, NOT a ring final, and the Zs / cable thermal protection
      assumptions for ring topology no longer apply.
      INV-14 enforces. Note: BS 7671 sub-clause §526.2 is not transcribed in
      the verified standards file; the anchor citation is IET OSG §8.4.4
      (which IS verified and already used by TOP-01..TOP-05 above).
    applies_to: circuits
    enforcement: hard_fail

  - id: TOP-10
    jurisdiction: [GB, KE, INT]
    standard_reference: "IET On-Site Guide §8.4.4 (8th Edition)"
    rule_text: >
      Per-circuit floor-area cross-check: circuit.floor_area_m2 (the
      engineer-declared floor area served) MUST equal Σ(rooms_covered[].
      floor_area_m2) (the sum of rooms the circuit actually feeds, derived
      from circuit.rooms_covered). Drift between the two suggests one of:
        (a) the engineer declared an area without listing the rooms,
        (b) the rooms_covered list is stale (room added/removed in iteration),
        (c) a typo in either field.
      INV-15 enforces. Tolerance: ±5% (rounding in m² conversions).
    applies_to: circuits
    enforcement: hard_fail

  - id: TOP-11
    jurisdiction: [GB, KE]
    standard_reference: "BS 7671:2018+A2:2022 §433.1.1 + IET On-Site Guide §8.4.4"
    rule_text: >
      OCPD-topology coordination: the chosen MCB rating MUST be coordinated
      with the topology and conductor csa:
        - topology=ring          → MCB ≤ 32 A
        - topology=radial AND cable_csa_mm2=2.5 → MCB ≤ 20 A
        - topology=radial AND cable_csa_mm2=4   → MCB ≤ 32 A
        - topology=dedicated_radial → MCB sized by connected load per §433.1.1
      A 32 A MCB on a 2.5 mm² radial would breach Iz before tripping under
      sustained 20-32 A; the cable overheats. INV-16 enforces.
    applies_to: circuits
    enforcement: hard_fail

  - id: TOP-12
    jurisdiction: [GB, KE]
    standard_reference: "IET On-Site Guide §8.4.4 (8th Edition, AMD 2 update) + BS 7671:2018+A2:2022 §433 (top-level)"
    rule_text: >
      Fused connection unit (FCU) spur modelling: when circuits[].fcu_spurs[]
      is populated, every entry MUST have fcu_rating_a ∈ {3, 5, 13} AND
      downstream_loads_w ≤ (fcu_rating_a × 230 V) — the FCU is the
      load's OCPD and must not be over-loaded. AMD 2 corrigenda clarified
      the 13 A FCU + ring final rules — the FCU is the spur's protection,
      not the ring MCB. INV-17 enforces (MEDIUM severity; an over-loaded
      FCU is a design defect but not a structural compliance breach because
      the FCU would still trip under fault — the breach is engineering
      best-practice).
      Note: BS 7671 sub-clause §433.2 is not transcribed in the verified
      standards file; the anchor citation is IET OSG §8.4.4 AMD 2.
    applies_to: circuits
    enforcement: warning
