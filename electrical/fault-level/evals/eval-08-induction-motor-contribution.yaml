name: eval-08-induction-motor-contribution
skill: fault-level
category: skill_specific
description: |
  Industrial site: 2500 kVA TX + 500 kW connected motor load (running). Motor contribution > 1% threshold per IEC 60909-0 §4.5.1.2.
  Must include motor_aggregate source in sources[] with ILR-based Ik" contribution.

input:
  jurisdiction: "INT"
  project_id: "ind-motor-fl-eg08"
  supply_voltage_v: "400"
  hv_side_present: false
  primary_transformer_kva: 2500
  primary_transformer_zpu_pct: 6.0
  standby_generator_present: false
  ups_present: false
  motor_load_kw: 500
  cascade_topology_source: "engineer_declared"
  cascade_engineer_declared:
    - { node_id: "TX-1", parent_node_id: null, node_kind: "transformer_secondary" }
    - { node_id: "MCC-1", parent_node_id: "TX-1", node_kind: "board_incoming", designation: "Motor control center" }

checks:
  - assertion: 'ir matches "fault-level-ir.schema.json"'
    description: Output validates against the fault-level IR schema
    severity: critical

  - assertion: 'ir.sources[*].kind contains "motor_aggregate"'
    description: sources[] must include a motor_aggregate entry
    severity: warning

  - assertion: 'ir.rationale.sections[*].decisions[*].code_clause matches "IEC 60909-0:2016 §4.5"'
    description: At least 1 citation matches IEC 60909-0:2016 §4.5
    severity: warning

  - assertion: 'ir.compliance_summary.assumptions[*] != null'
    description: Engineer-input motor ILR assumption must be captured in compliance_summary.assumptions
    severity: warning
