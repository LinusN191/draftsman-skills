name: eval-04-missing-source-data
skill: fault-level
category: missing_input
description: |
  No transformer Zpu, no DNO PSCC, no engineer-declared Ifault.
  Skill must emit tool_call_pending: true on every cascade node + TOOL-CALL-PENDING flag, NOT invent values.

input:
  jurisdiction: "EU"
  project_id: "missing-data-fl-eg04"
  supply_voltage_v: "400"
  hv_side_present: false
  primary_transformer_kva: 630
  standby_generator_present: false
  ups_present: false
  motor_load_kw: 0
  cascade_topology_source: "engineer_declared"
  cascade_engineer_declared:
    - { node_id: "TX-1", parent_node_id: null, node_kind: "transformer_secondary" }
    - { node_id: "DB-EU1", parent_node_id: "TX-1", node_kind: "board_incoming" }

checks:
  - assertion: 'ir matches "fault-level-ir.schema.json"'
    description: Output validates against the fault-level IR schema
    severity: critical

  - assertion: 'ir.cascade[*].tool_call_pending all_equal true'
    description: All nodes deferred until calc.iec60909_cascade tool runs OR engineer provides Zpu
    severity: warning

  - assertion: 'ir.flags contains "TOOL-CALL-PENDING"'
    description: Top-level flags must include TOOL-CALL-PENDING
    severity: warning

  - assertion: 'ir.compliance_summary.non_compliance_flags.length >= 1'
    description: At least one flag for missing source data
    severity: warning

  - assertion: 'ir.invariants[?(@.id=="INV-07")].passes == true'
    description: INV-7 invariant must pass
    severity: critical
    matches_inv: INV-7
