name: eval-03-undersized-breaker-trap
skill: fault-level
category: validation_trap
description: |
  Cascade Ifault = 12 kA at MSB-1 outgoing. Engineer-declared MCB at that node has Icn = 6 kA.
  Generator MUST emit a CRITICAL flag, NOT silently pass selectivity_implications[*].adequate = true.

input:
  jurisdiction: "GB"
  project_id: "trap-fl-eg03"
  supply_voltage_v: "400"
  hv_side_present: false
  primary_transformer_kva: 1000
  primary_transformer_zpu_pct: 4.0
  standby_generator_present: false
  ups_present: false
  motor_load_kw: 0
  cascade_topology_source: "engineer_declared"
  cascade_engineer_declared:
    - { node_id: "TX-1", parent_node_id: null, node_kind: "transformer_secondary" }
    - { node_id: "MSB-1.F01", parent_node_id: "TX-1", node_kind: "board_outgoing_feeder", designation: "Feeder with under-rated MCB" }
  declared_devices:
    - { breaker_id: "F01-MCB", breaker_rating_a: 32, breaker_icn_ka: 6, at_node: "MSB-1.F01" }

checks:
  - assertion: 'ir matches "fault-level-ir.schema.json"'
    description: Output validates against the fault-level IR schema
    severity: critical

  - assertion: 'ir.selectivity_implications[?(@.breaker_id==''F01-MCB'')].adequate == false'
    description: Generator must NOT silently accept the trap — F01-MCB adequacy must be false
    severity: critical

  - assertion: 'ir.flags contains "BREAKER_UNDERRATED_FOR_FAULT_LEVEL"'
    description: Top-level flags must include BREAKER_UNDERRATED_FOR_FAULT_LEVEL
    severity: critical

  - assertion: 'ir.compliance_summary.compliant == false'
    description: Compliance summary must report non-compliant
    severity: critical

  - assertion: 'ir.invariants[?(@.id=="INV-06")].passes == true'
    description: Breaker adequacy check
    severity: critical
    matches_inv: INV-6
