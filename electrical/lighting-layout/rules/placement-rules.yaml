id: placement-rules
description: Luminaire placement rules for lighting-layout
rules:
  - id: grid-snap
    description: All positions must snap to 50mm grid minimum; 600mm grid if ceiling grid present
  - id: edge-clearance
    description: Edge luminaires minimum 0.5 × row-spacing from wall
  - id: door-clearance
    description: No luminaire within 300mm of door leaf sweep arc
