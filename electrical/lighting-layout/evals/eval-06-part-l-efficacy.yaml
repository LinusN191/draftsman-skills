id: eval-06-part-l-efficacy
title: Part L controls compliance — new-build office
version: "1.0"
skill: lighting-layout

input:
  room_length_m: 10
  room_width_m: 8
  ceiling_height_m: 3.0
  room_type: open_plan_office
  luminaire: 600x600 LED recessed panel
  lumen_output_design: 4500
  wattage_w: 70
  new_build: true
  jurisdiction: england_wales
  glazed_wall: south

expected_calculations:
  lamp_efficacy_lm_per_w: 64.3
  part_l_minimum: 65
  result: NON_COMPLIANCE

pass_criteria:
  - Skill calculates efficacy = 64.3 lm/W
  - Output includes [NON-COMPLIANCE RISK: Lamp efficacy 64.3 lm/W is below AD Part L 2021 target of 65 lm/W]
  - Skill states occupancy sensing AND daylight control in perimeter zone are required
  - Perimeter zone identified for south wall
  - controls.part_l_assessed = true
  - controls.part_l_compliant = false
  - calculation_summary.non_compliance_flags non-empty
  - Skill recommends luminaire with >= 65 lm/W

fail_conditions:
  - Efficacy check passes without calculating lm/W
  - No mention of AD Part L 2021
  - controls.part_l_compliant = true or null when efficacy fails

