name: eval-06-part-l-efficacy
skill: lighting-layout
description: >
  Compliance failure — UK new-build with a luminaire whose efficacy is 64.3 lm/W,
  below AD Part L 2021 target of 65 lm/W. Skill must compute the efficacy,
  flag NON-COMPLIANCE, identify the south perimeter zone, and require both
  occupancy sensing and daylight-linked dimming.
category: compliance_failure

input:
  room_type: open_plan_office
  room_length_mm: 10000
  room_width_mm: 8000
  ceiling_height_mm: 3000
  luminaire_lumens: 4500
  lumen_type: design
  luminaire_wattage_w: 70
  is_uk_new_build: true
  jurisdiction: GB
  glazed_wall_positions:
    - "S"

expected_compliance:
  lamp_efficacy_lm_per_w: 64.3
  part_l_minimum_lm_per_w: 65
  part_l_compliant: false

checks:
  - assertion: ir.controls.lamp_efficacy_lm_per_w >= 64.0
    description: Computed efficacy must be within tolerance of 64.3 lm/W (lower bound)

  - assertion: ir.controls.lamp_efficacy_lm_per_w <= 64.6
    description: Computed efficacy upper bound

  - assertion: ir.controls.part_l_assessed == true
    description: Part L assessment must be performed for UK new-build

  - assertion: ir.controls.part_l_compliant == false
    description: Part L compliance flag must be false when efficacy < 65 lm/W

  - assertion: ir.calculation_summary.non_compliance_flags[*].reference contains "Part L"
    description: Non-compliance flag must cite Part L

  - assertion: ir.controls.perimeter_zones[*].wall contains "S"
    description: South perimeter zone must be identified (glazed wall)

  - assertion: ir.controls.required contains "occupancy"
    description: Occupancy sensing required

  - assertion: ir.controls.required contains "daylight"
    description: Daylight-linked dimming required in perimeter zone

  - assertion: ir.flags contains "NON-COMPLIANCE"
    description: Chat-facing NON-COMPLIANCE flag must appear

expected_flags:
  - "NON-COMPLIANCE"
  - "Part L"
