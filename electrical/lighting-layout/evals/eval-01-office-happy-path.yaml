name: eval-01-office-happy-path
skill: lighting-layout
description: >
  Happy path — 80 m² open-plan office. Standard inputs, complete data, no edge
  conditions. Verifies the skill produces a compliant layout with the right
  fixture count, correct circuit loading, and the required assumption flags.
category: happy_path

input:
  room_type: open_plan_office
  room_length_mm: 10000
  room_width_mm: 8000
  ceiling_height_mm: 3000
  luminaire_lumens: 4500
  lumen_type: design
  luminaire_wattage_w: 36
  ceiling_grid_mm: 600

expected_compliance:
  lux_target_lx: 500
  achieved_min_lx: 500
  part_l_required: false
  compliant: true

checks:
  - assertion: ir.calculation_summary.target_illuminance_lux == 500
    description: Target illuminance must match BS EN 12464-1 Table 5.3 for open_plan_office (500 lx)
    standard_ref: BS EN 12464-1:2021 Table 5.3

  - assertion: ir.room.room_index >= 1.90
    description: Computed room index lower bound (k ≈ 1.98)

  - assertion: ir.room.room_index <= 2.05
    description: Computed room index upper bound

  - assertion: ir.calculation_summary.achieved_illuminance_lux >= 500
    description: Achieved illuminance must meet the target after ceiling-rounded fixture count

  - assertion: ir.calculation_summary.compliant == true
    description: Overall compliance flag must be true on a happy-path scenario

  - assertion: ir.luminaires.length >= 17
    description: N rounded UP from lumen-method result (never down)
    standard_ref: CIBSE SLL Code for Lighting 2012

  - assertion: ir.calculation_summary.assumptions contains "UF"
    description: Utilisation Factor must be flagged as assumption

  - assertion: ir.calculation_summary.assumptions contains "MF"
    description: Maintenance Factor must be flagged as assumption

  - assertion: ir.circuits[*].load_w <= 1840
    description: 80% rule — 10 A MCB × 230 V × 0.8 = 1840 W
    standard_ref: BS 7671 Reg 433.1

  - assertion: ir.switches.length >= 1
    description: At least one switching point must be placed

expected_flags: []
