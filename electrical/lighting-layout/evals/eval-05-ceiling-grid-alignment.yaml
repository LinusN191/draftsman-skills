name: eval-05-ceiling-grid-alignment
skill: lighting-layout
description: >
  Edge case — 600 mm ceiling grid present. All luminaire positions must land
  at the centre of a 600 mm cell, i.e. on a 300 mm modulus. The drawing notes
  must record the grid-alignment assumption.
category: edge_case

input:
  room_type: private_office
  room_length_mm: 9000
  room_width_mm: 6000
  ceiling_height_mm: 2800
  luminaire_lumens: 3500
  lumen_type: design
  luminaire_wattage_w: 28
  ceiling_grid_mm: 600

expected_compliance:
  grid_modulus_mm: 300
  notes_reference_grid: true

checks:
  - assertion: ir.luminaires[*].position_mm.x all_equal_modulo_300
    description: Every luminaire x-position must be on a 300 mm modulus (centre of 600 mm grid cell)

  - assertion: ir.luminaires[*].position_mm.y all_equal_modulo_300
    description: Every luminaire y-position must be on a 300 mm modulus

  - assertion: ir.drawing_notes contains "ceiling grid"
    description: Drawing notes must record the grid-alignment assumption

  - assertion: ir.calculation_summary.compliant == true
    description: Overall compliance on the happy edge-case scenario

expected_flags: []
