name: eval-03-missing-lumen-data
skill: lighting-layout
description: >
  Edge case — luminaire specified but lumen output omitted. Skill must stop and
  ask for the lumen output rather than guess. Verifies discovery-time gap is
  caught before IR is produced.
category: edge_case

input:
  room_type: warehouse
  room_length_mm: 12000
  room_width_mm: 10000
  ceiling_height_mm: 3500
  luminaire_lumens: null
  lumen_type: unknown

expected_compliance:
  ir_emitted: false
  reason: missing_required_input

checks:
  - assertion: ir.calculation_summary.discovery_status == "incomplete"
    description: Skill must report incomplete discovery rather than emit a full IR

  - assertion: ir.calculation_summary.missing_inputs contains "luminaire_lumens"
    description: The specific missing input must be named

  - assertion: ir.luminaires.length == 0
    description: No luminaires placed when lumen data is missing
    severity: critical

  - assertion: ir.calculation_summary.discovery_status == "incomplete"
    description: Chat-facing flag must signal the discovery gap

expected_flags:
  - "INCOMPLETE-INPUT"
