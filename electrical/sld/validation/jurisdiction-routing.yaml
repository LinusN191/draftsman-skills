# SLD v1.3 — Jurisdiction-specific citation format validation
#
# Ensures that code_clause citations match the declared jurisdiction.
# Prevents accidental cross-jurisdiction citation (e.g., BS 7671 in US design).

name: jurisdiction-routing
applies_to: electrical/sld
schema_version: 1.3.0

checks:
  - id: gb-citations-start-with-bs
    severity: critical
    description: "When jurisdiction == GB, all code_clause values in rules and constraints must cite BS standards"
    rule: |
      if ir.jurisdiction == "GB" then
        For every code_clause in ir (from rules, constraints, validation):
          code_clause must match regex: ^BS [0-9]{3,5}:[20][0-9]{2}

          Examples of VALID: "BS 7671:2018", "BS 7430:2011"
          Examples of INVALID: "IEC 60364-4-41", "NEC 2023", "KS 1700:2018"

      A GB design must be justified by BS standards. Cross-citing IEC is acceptable as "also applies per IEC,"
      but primary justification must be BS.
    reference: "BS 7671:2018 (UK national implementation of IEC 60364)"

  - id: ke-citations-start-with-ks
    severity: critical
    description: "When jurisdiction == KE, all code_clause values must cite KS 1700 (not 'BS 7671 adopted by KS 1700')"
    rule: |
      if ir.jurisdiction == "KE" then
        For every code_clause in ir:
          code_clause must match: ^KS 1700:[0-9]{4}

          Examples of VALID: "KS 1700:2018", "KS 1700:2018 Regulation 411"
          Examples of INVALID: "BS 7671:2018 (adopted by KS 1700)", "BS 7671 Reg 411"

      KE designs are justified by KS 1700 as the primary standard. Reference IEC or BS only in secondary notes.
    reference: "KS 1700:2018 (Kenya national standard for electrical safety)"

  - id: us-citations-start-with-nec
    severity: critical
    description: "When jurisdiction == US, all code_clause values must cite NEC or NFPA 70 (not BS or KS)"
    rule: |
      if ir.jurisdiction == "US" then
        For every code_clause in ir:
          code_clause must match: ^(NEC [0-9]{4}|NFPA 70:[0-9]{4})

          Examples of VALID: "NEC 2023", "NFPA 70:2023", "NEC 2023 Section 240"
          Examples of INVALID: "BS 7671:2018", "IEC 60364", "NEC Article 240 (equivalent to IEC 60947-2)"

      US designs must justify choices under US electrical code (NEC/NFPA). International codes are reference only.
    reference: "NEC 2023 (National Electrical Code) / NFPA 70 (National Fire Protection Association Standard 70)"
