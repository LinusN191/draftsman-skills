name: eval-10-multi-sheet-split-logic
skill: sld
description: |
  Verifies the hybrid multi-sheet split rule: <=8 boards single-sheet UNLESS
  fire_alarm_life_safety + general_power coexist (forces split). Validates
  that the INT example correctly splits while UK/KE/US stay single-sheet.
category: skill_specific

input_fixtures:
  - ../examples/uk-commercial-office-3storey/output.json
  - ../examples/ke-nairobi-industrial-msb-gh/output.json
  - ../examples/intl-commercial-msb-4subdbs/output.json
  - ../examples/us-strip-mall-msp-tenants/output.json

checks:
  - assertion: "len(output.drawing_layout.sheets) == 1 if output.meta.project_id.startswith('uk-') else True"
    description: UK example (4 boards, no fire-alarm) is single-sheet.
    severity: critical

  - assertion: "len(output.drawing_layout.sheets) == 1 if output.meta.project_id.startswith('ke-') else True"
    description: KE example (2 boards) is single-sheet.
    severity: critical

  - assertion: "len(output.drawing_layout.sheets) == 1 if output.meta.project_id.startswith('us-') else True"
    description: US example (4 boards, no fire-alarm in cascade) is single-sheet.
    severity: critical

  - assertion: "len(output.drawing_layout.sheets) == 2 if output.meta.project_id.startswith('intl-') else True"
    description: INT example (9 boards, life-safety coexistence) splits to exactly 2 sheets.
    severity: critical

  - assertion: |
      (output.drawing_layout.boards['DB-FA1'].sheet_id != output.drawing_layout.boards['DB-P1'].sheet_id)
      if output.meta.project_id.startswith('intl-') else True
    description: |
      INT example: fire_alarm_life_safety board (DB-FA1) is on a different sheet
      from general_power boards (DB-P1) per BS 9999 §6.4 / IEC 60364-5-56:2018 §560.
    severity: critical

  - assertion: |
      all(
        s.split_rationale is not None
        and len(s.split_rationale) > 0
        and len(s.split_rationale) <= 200
        for s in output.drawing_layout.sheets
      )
    description: Every sheet has a non-empty split_rationale <= 200 chars.
    severity: warning
