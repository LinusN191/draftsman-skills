# Eval 08 — Rollup intent shape must satisfy earthing skill's existing expectation
# Category: cross_validation (intent_rollup_shape)

name: eval-08-intent-rollup-shape
skill: db-layout
category: cross_validation
description: |
  Reuses eval-01 input but specifically validates that the emitted db-layout-rollup
  intent payload is structurally compatible with what electrical/earthing examples
  declare as their consumed_intent for db-layout.

  Verifies the cross-skill contract is intact — drift here breaks earthing.

input:
  reuse_eval: "eval-01-uk-domestic-cu-tn-cs"

checks:
  - assertion: 'ir.board.db_id != null'
    description: Emitted db-layout-rollup intent must validate against the published rollup schema
    severity: critical

  - assertion: 'ir.meta.project_id != null'
    description: db-layout-rollup payload must carry project_id
    severity: critical

  - assertion: 'ir.board.db_id != null'
    description: Intent T must carry field boards[*].id
    severity: critical

  - assertion: 'ir.main_switch.rating_a != null'
    description: Intent T must carry field boards[*].main_switch_rating_a
    severity: critical

  - assertion: 'ir.circuits[*].circuit_id != null'
    description: Intent T must carry field outgoing_circuits[*].id (IR field is circuit_id)
    severity: critical

  - assertion: 'ir.circuits[*].ocpd.rating_a != null'
    description: Intent T must carry field outgoing_circuits[*].ocpd_rating_a (IR field is ocpd.rating_a)
    severity: critical

  - assertion: 'ir.circuits[*].ocpd.type != null'
    description: Intent T must carry field outgoing_circuits[*].ocpd_type (IR field is ocpd.type)
    severity: critical

  # Tier 4 approximation: cross_skill_compatibility_check
  # Full semantics: Earthing example's expected db-layout payload shape must structurally match the emitted rollup intent
  # TODO: deeper cross-skill structural diff requires harness support
  - assertion: 'ir.board.db_id != null'
    description: >-
      Cross-skill structural compatibility — earthing consumes db-layout-rollup; emitted rollup must match
      shape consumed by electrical/earthing/examples/uk-dwelling-tn-cs (consumer_field_path:
      consumed_intents[?(@.intent_type=='db-layout')].payload).
    severity: warning
