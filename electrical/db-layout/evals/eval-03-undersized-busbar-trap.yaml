# Eval 03 — Generator MUST detect and flag an undersized busbar
# Category: validation_trap

name: eval-03-undersized-busbar-trap
skill: db-layout
category: validation_trap
description: |
  Engineer declares busbar rating 200A but sum of way loads × diversity = 230A.
  Generator must either:
  (a) Emit busbar.rating_a = 250 (next standard rating up) AND flag the engineer
      override in compliance_summary.non_compliance_flags, OR
  (b) Accept the 200A only with a critical flag "BUSBAR_UNDERSIZED".
  Silently accepting 200A is a FAIL.

input:
  jurisdiction: "GB"
  board_type: "distribution_board"
  db_designation: "DB-X1"
  location: "test fixture"
  fed_from: "MSB-01"
  supply_voltage_v: "400"
  phase_arrangement: "TPN"
  supply_rating_a: 200
  busbar_rating_a_declared: 200
  ways_total: 12
  form_separation_iec61439: "2a"
  circuits_declared:
    - { id: "C01", designation: "Trap load 1", ocpd_rating_a: 80, ocpd_curve: "C", ocpd_type: "MCCB", load_kw: 50 }
    - { id: "C02", designation: "Trap load 2", ocpd_rating_a: 80, ocpd_curve: "C", ocpd_type: "MCCB", load_kw: 50 }
    - { id: "C03", designation: "Trap load 3", ocpd_rating_a: 80, ocpd_curve: "C", ocpd_type: "MCCB", load_kw: 50 }
    - { id: "C04", designation: "Trap load 4", ocpd_rating_a: 50, ocpd_curve: "C", ocpd_type: "MCCB", load_kw: 30 }
  diversity_factor_main: 0.85

checks:
  - assertion: 'ir matches "db-layout-ir.schema.json"'
    description: Output validates against the db-layout IR schema
    severity: critical

  # Tier 4 approximation: original any_one_of_must_be_true — pick the cleanest observable (busbar not silently 200)
  # Full semantics: Generator chose next-rating-up (busbar.rating_a >= 250) OR flagged the undersize in compliance_summary.non_compliance_flags
  # TODO: harness needs OR-clause support for full fidelity
  - assertion: 'ir.busbar.rating_a != 200'
    description: >-
      Generator must NOT silently accept the trap input busbar rating.
      Expect either busbar.rating_a >= 250 (next rating up) OR a BUSBAR_UNDERSIZED flag in
      compliance_summary.non_compliance_flags — both are valid outcomes; busbar == 200 with no flag is a critical fail.
    severity: critical

  - assertion: 'ir.invariants.INV-3.passes == true'
    description: Busbar rating coverage
    severity: critical
    matches_inv: INV-3
