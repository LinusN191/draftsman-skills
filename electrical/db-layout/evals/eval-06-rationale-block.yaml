# Eval 06 — Rationale block must be present and substantive
# Category: rationale_block

name: eval-06-rationale-block
skill: db-layout
category: rationale_block
description: |
  Reuses eval-01 happy-path scenario but targets the rationale block specifically.
  Per WI2 the rationale block is mandatory and must contain 9 sections + chat_summary
  + decisions with clause citations.

input:
  reuse_eval: "eval-01-uk-domestic-cu-tn-cs"

checks:
  - assertion: 'ir matches "db-layout-ir.schema.json"'
    description: Output validates against the db-layout IR schema
    severity: critical

  - assertion: 'ir.rationale.chat_summary != null'
    description: Rationale chat_summary must be present
    severity: warning

  - assertion: 'ir.rationale.chat_summary.length >= 40'
    description: chat_summary must be at least 40 characters (per rationale schema constraint)
    severity: warning

  - assertion: 'ir.rationale.chat_summary.length <= 500'
    description: chat_summary must be at most 500 characters (per rationale schema constraint)
    severity: warning

  - assertion: 'ir.rationale.sections.length >= 9'
    description: 9 sections per Step 13 of generator
    severity: warning

  - assertion: 'ir.rationale.sections[*].title not_contains null'
    description: Every section must have a non-null title
    severity: warning

  - assertion: 'ir.rationale.sections[*].summary not_contains null'
    description: Every section must have a non-null summary
    severity: warning

  - assertion: 'ir.rationale.sections[*].decisions[*].code_clause matches "^(BS 7671:2018\+A3|IEC 60364-[0-9]+-[0-9]+|IEC 61439-[0-9]+|NEC 2023)"'
    description: Citations must use canonical format
    severity: warning

  - assertion: 'ir.rationale.sections[?(@.title==''OCPD Selection'')].decisions.length >= 1'
    description: OCPD Selection section must have at least one decision
    severity: warning
