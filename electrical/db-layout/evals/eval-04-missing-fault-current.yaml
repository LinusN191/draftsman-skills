# Eval 04 — No fault-level intent + no engineer Ifault — selectivity must defer, not invent
# Category: missing_input

name: eval-04-missing-fault-current
skill: db-layout
category: missing_input
description: |
  Engineer has not declared fault currents, fault-level intent is absent.
  Generator must NOT invent values. Every selectivity_results entry must:
  (a) Set source = "tool_call_pending", AND
  (b) Set tool_call_pending = true, AND
  (c) The top-level flags array must include "TOOL-CALL-PENDING".

input:
  jurisdiction: "EU"
  board_type: "distribution_board"
  db_designation: "DB-EU1"
  location: "EU test installation"
  fed_from: "MSB-01"
  supply_voltage_v: "400"
  phase_arrangement: "TPN"
  supply_rating_a: 250
  ways_total: 18
  form_separation_iec61439: "3a"
  circuits_declared:
    - { id: "C01", designation: "Office lighting", ocpd_rating_a: 16, ocpd_curve: "B", ocpd_type: "MCB", phase_csa_mm2: 2.5, length_m: 30, load_kw: 3 }
    - { id: "C02", designation: "Office receptacles", ocpd_rating_a: 20, ocpd_curve: "C", ocpd_type: "MCB", phase_csa_mm2: 2.5, length_m: 35, load_kw: 4 }
  # No fault_currents_engineer_declared
  # No cross_drawing_context.fault-level

checks:
  - assertion: 'ir matches "db-layout-ir.schema.json"'
    description: Output validates against the db-layout IR schema
    severity: critical

  - assertion: 'ir.selectivity_results[*].source all_equal "tool_call_pending"'
    description: All selectivity_results sources must be tool_call_pending when no fault data provided
    severity: warning

  - assertion: 'ir.selectivity_results[*].tool_call_pending all_equal true'
    description: All selectivity_results entries must have tool_call_pending == true
    severity: warning

  - assertion: 'ir.flags contains "TOOL-CALL-PENDING"'
    description: Top-level flags must include TOOL-CALL-PENDING
    severity: warning

  - assertion: 'ir.invariants[?(@.id=="INV-09")].passes == true'
    description: Selectivity result completeness via tool_call_pending
    severity: critical
    matches_inv: INV-9
