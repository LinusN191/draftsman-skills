# Eval 05 — US strip mall panelboard, NEC Art 408
# Category: jurisdiction_switch

name: eval-05-jurisdiction-us-panelboard
skill: db-layout
category: jurisdiction_switch
description: |
  US 200A 120/240V split-phase NEMA panelboard for a strip-mall retail fit-out.
  Must:
  (a) Use NEMA enclosure type (not IEC Form code)
  (b) Reference NFPA 70 Art 408 + Art 240 (not BS 7671 / IEC 60364)
  (c) Size by NEC table values (Table 220 for load, Table 250.122 for EGC)
  (d) Use GFCI/AFCI terminology, not RCD

input:
  jurisdiction: "US"
  board_type: "panelboard_nema"
  db_designation: "PB-1"
  location: "back-of-house service room"
  fed_from: "MAIN"
  supply_voltage_v: "240"
  phase_arrangement: "single_phase_split"
  supply_rating_a: 200
  ze_ohm_at_origin: 0.20
  ways_total: 24
  ip_rating: "NEMA_1"
  circuits_declared:
    - { id: "C01", designation: "General lighting", ocpd_rating_a: 20, ocpd_type: "MCB", phase_csa_awg: "12", length_m: 25, load_kw: 1.5 }
    - { id: "C02", designation: "General receptacles", ocpd_rating_a: 20, ocpd_type: "MCB", phase_csa_awg: "12", length_m: 30, load_kw: 1.5 }
    - { id: "C03", designation: "Reach-in cooler dedicated", ocpd_rating_a: 30, ocpd_type: "MCB", phase_csa_awg: "10", length_m: 18, load_kw: 3 }
    - { id: "C04", designation: "RTU HVAC unit", ocpd_rating_a: 60, ocpd_type: "MCCB", phase_csa_awg: "6", length_m: 35, load_kw: 11 }
  diversity_factor_main: 0.8

checks:
  - assertion: 'ir matches "db-layout-ir.schema.json"'
    description: Output validates against the db-layout IR schema
    severity: critical

  - assertion: 'ir.jurisdiction == "US"'
    description: Jurisdiction must be US
    severity: critical

  - assertion: 'ir.board.enclosure_form_nec_type != null'
    description: US must use NEMA type, not IEC Form
    severity: critical

  - assertion: 'ir.board.enclosure_form_iec61439 == null'
    description: US must NOT emit IEC Form code
    severity: critical

  - assertion: 'ir.rationale.sections[*].summary matches "^NEC 2023 Art (408|240|220|250)"'
    description: At least 2 citations match NEC 2023 Art 408/240/220/250 pattern
    severity: warning

  - assertion: 'ir.rationale.sections[*].summary not_contains "BS 7671"'
    description: Must NOT cite BS 7671 — US project must not cite UK regs
    severity: warning

  - assertion: 'ir.rationale.sections[*].summary not_contains "IEC 60364"'
    description: Must NOT cite IEC 60364 — US project must not cite IEC 60364
    severity: warning
