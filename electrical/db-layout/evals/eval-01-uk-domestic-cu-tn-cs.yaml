# Eval 01 — UK domestic consumer unit, TN-C-S
# Category: happy_path
# Standard refs: BS 7671:2018+A3, IEC 61439-3, IEC 60617

name: eval-01-uk-domestic-cu-tn-cs
skill: db-layout
category: happy_path
description: |
  Standard UK 3-bed semi-detached dwelling on PME supply (TN-C-S). 100A main switch +
  12-way Hager consumer unit + 30mA main RCD + 6 final circuits (lighting × 2, sockets × 2,
  cooker, shower). All circuits RCBO or behind main RCD. Form 1 enclosure.

input:
  jurisdiction: "GB"
  board_type: "consumer_unit"
  db_designation: "CU-G"
  location: "hallway cupboard"
  fed_from: "MAIN"
  supply_voltage_v: "230"
  phase_arrangement: "single_phase"
  supply_rating_a: 100
  ze_ohm_at_origin: 0.35
  ways_total: 12
  ways_spare_minimum: 2
  form_separation_iec61439: "1"
  ip_rating: "IP2X"
  circuits_declared:
    - { id: "C01", designation: "Ground floor lighting", ocpd_rating_a: 6, ocpd_curve: "B", ocpd_type: "MCB", rcd_protected: true, rcd_sensitivity_ma: 30, phase_csa_mm2: 1.5, length_m: 18, load_kw: 0.8, voltage_class: "LV_power" }
    - { id: "C02", designation: "First floor lighting", ocpd_rating_a: 6, ocpd_curve: "B", ocpd_type: "MCB", rcd_protected: true, rcd_sensitivity_ma: 30, phase_csa_mm2: 1.5, length_m: 22, load_kw: 0.7, voltage_class: "LV_power" }
    - { id: "C03", designation: "Ground floor sockets ring", ocpd_rating_a: 32, ocpd_curve: "B", ocpd_type: "MCB", rcd_protected: true, rcd_sensitivity_ma: 30, phase_csa_mm2: 2.5, length_m: 38, load_kw: 5.0, voltage_class: "LV_power" }
    - { id: "C04", designation: "First floor sockets ring", ocpd_rating_a: 32, ocpd_curve: "B", ocpd_type: "MCB", rcd_protected: true, rcd_sensitivity_ma: 30, phase_csa_mm2: 2.5, length_m: 42, load_kw: 4.0, voltage_class: "LV_power" }
    - { id: "C05", designation: "Cooker radial", ocpd_rating_a: 32, ocpd_curve: "B", ocpd_type: "MCB", rcd_protected: true, rcd_sensitivity_ma: 30, phase_csa_mm2: 6.0, length_m: 14, load_kw: 7.5, voltage_class: "LV_power" }
    - { id: "C06", designation: "Bathroom shower", ocpd_rating_a: 40, ocpd_curve: "B", ocpd_type: "MCB", rcd_protected: true, rcd_sensitivity_ma: 30, phase_csa_mm2: 10.0, length_m: 16, load_kw: 9.0, voltage_class: "LV_power" }
  diversity_factor_main: 0.4
  rcd_type_default: "A"

checks:
  - assertion: 'ir matches "db-layout-ir.schema.json"'
    description: Output validates against the db-layout IR schema
    severity: critical

  - assertion: 'ir.jurisdiction == "GB"'
    description: Jurisdiction must be GB
    severity: critical

  - assertion: 'ir.board.db_id == "CU-G"'
    description: Board id must match declared designation
    severity: critical

  - assertion: 'ir.board.enclosure_form_iec61439 == "1"'
    description: Enclosure form must be Form 1 as declared
    severity: critical

  - assertion: 'ir.circuits.length == 6'
    description: Six circuits declared in input must appear in IR
    severity: critical

  - assertion: 'ir.board.ways_used <= 12'
    description: Ways used must not exceed declared total of 12
    severity: critical

  - assertion: 'ir.invariants.INV-1.passes == true'
    description: Way accounting
    severity: critical
    matches_inv: INV-1

  - assertion: 'ir.invariants.INV-3.passes == true'
    description: Busbar rating coverage
    severity: critical
    matches_inv: INV-3

  - assertion: 'ir.invariants.INV-4.passes == true'
    description: OCPD-cable coordination
    severity: critical
    matches_inv: INV-4

  - assertion: 'ir.citations matches "^BS 7671:2018\+A3 Reg 4(11|33)\."'
    description: At least 2 citations match pattern
    severity: warning

  - assertion: 'ir.rationale.sections[*].title contains "Board Classification"'
    description: "Rationale must include section: Board Classification"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Incoming Supply"'
    description: "Rationale must include section: Incoming Supply"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Busbar Sizing"'
    description: "Rationale must include section: Busbar Sizing"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Way Assignment"'
    description: "Rationale must include section: Way Assignment"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "OCPD Selection"'
    description: "Rationale must include section: OCPD Selection"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "RCD Strategy"'
    description: "Rationale must include section: RCD Strategy"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Cable Selection"'
    description: "Rationale must include section: Cable Selection"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Selectivity Verification"'
    description: "Rationale must include section: Selectivity Verification"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Compliance"'
    description: "Rationale must include section: Compliance"
    severity: critical
