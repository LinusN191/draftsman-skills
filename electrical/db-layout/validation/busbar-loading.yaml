# DB Layout — Busbar loading validation
version: 1.0.0
applies_to_drawing_types: ["db_layout_schedule_and_schematic"]

checks:
  - id: busbar-001-rating-vs-sum
    name: Busbar rating must accommodate sum of way loads after diversity
    severity: critical
    jsonpath: "$.busbar"
    assert: "rating_a >= (sum_of_circuit_loads_a * diversity_factor)"
    message: "Busbar undersized: rating {rating_a}A < sum × diversity"
    standard_ref: "IEC 61439-1 rated current of assembly"

  - id: busbar-002-ipk-withstand
    name: Assembly's rated peak withstand current must exceed prospective peak fault current
    severity: critical
    jsonpath: "$.busbar"
    assert: "ipk_withstand_ka >= ipk_ka"
    message: "Assembly Ipk withstand ({ipk_withstand_ka} kA) does not exceed prospective peak fault ({ipk_ka} kA)"
    standard_ref: "IEC 61439-1 clause 5.3.7 (peak withstand) + clause 10.11 short-circuit verification"
    note: "Ipk_withstand and Icw are SEPARATE assembly ratings — both must be verified independently"

  - id: busbar-002b-icw-vs-ifault-rms
    name: Busbar IcW must withstand the RMS fault current for 1 second
    severity: critical
    jsonpath: "$.busbar"
    when: "ifault_rms_ka is not null"
    assert: "icw_ka_1s >= ifault_rms_ka"
    message: "Busbar IcW ({icw_ka_1s} kA·1s) does not withstand prospective RMS fault current ({ifault_rms_ka} kA)"
    standard_ref: "IEC 61439-1 clause 5.3.6 (rated short-time withstand current)"

  - id: busbar-003-ways-accounting
    name: Ways used + spare must equal total
    severity: high
    jsonpath: "$.board"
    assert: "ways_used + ways_spare == ways_total"
    message: "Ways accounting wrong: used + spare != total"
    standard_ref: "design integrity check"

  - id: busbar-004-spare-ways-minimum
    name: Spare ways meet engineer-specified minimum
    severity: warning
    jsonpath: "$.board"
    when: "inputs.ways_spare_minimum is not null"
    assert: "ways_spare >= inputs.ways_spare_minimum"
    message: "Spare ways {ways_spare} below specified minimum {inputs.ways_spare_minimum}"
    standard_ref: "design requirement"
