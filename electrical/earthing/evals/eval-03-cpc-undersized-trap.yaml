# Eval 03 — Generator MUST detect and reject an undersized CPC
# Category: validation_trap

name: eval-03-cpc-undersized-trap
skill: earthing
category: validation_trap
description: |
  The input feeds a circuit where the engineer has declared a 1.5mm² CPC on a
  10mm² phase circuit. Per BS 7671 Table 54.7 this is incorrect — for L>16mm² ÷ 2
  would give 5mm², but for L≤16mm² CPC must equal L. The generator must EITHER
  (a) emit cpc.csa_mm2 == 10 with method 'bs7671_table_54.7', OR
  (b) emit cpc.csa_mm2 lower via adiabatic with method 'bs7671_adiabatic_54.1' and an
      adiabatic-computed value justified by I²t.
  Emitting 1.5mm² is a critical fail.

input:
  jurisdiction: "GB"
  earthing_system_declared: "TN-C-S"
  supply_voltage_v: 230
  ze_ohm_declared: 0.30
  water_service_metallic: true
  gas_service_metallic: true
  extraneous_parts: []
  met_location: "service intake"
  supplementary_bonding_required_locations: []
  trap_input_circuit:
    circuit_id: "L1"
    designation: "cooker circuit"
    line_csa_mm2: 10
    declared_cpc_csa_mm2: 1.5
    ocpd_rating_a: 32
    ocpd_type: "B"
    length_m: 18
  consumed_intents:
    - { intent_type: "db-layout", intent_version: "1.0.0", produced_by: "electrical/db-layout/v1.0.0", payload_ref: "test-fixtures/db-layout-eval03.json" }

checks:
  - assertion: 'ir matches "earthing-ir.schema.json"'
    description: Output validates against the earthing IR schema
    severity: critical

  - assertion: 'ir.circuits[?(@.circuit_id==''L1'')].cpc.csa_mm2 != 1.5'
    description: Generator must NOT accept the undersized declared CPC (1.5mm² is wrong for a 10mm² phase)
    severity: critical

  - assertion: 'ir.circuits[?(@.circuit_id==''L1'')].cpc.cpc_sizing_method matches "^(bs7671_table_54\.7|bs7671_adiabatic_54\.1)$"'
    description: Value must be one of bs7671_table_54.7/bs7671_adiabatic_54.1
    severity: critical

  - assertion: 'ir.invariants[?(@.id=="INV-04")].passes == true'
    description: CPC sizing method must match jurisdiction
    severity: critical
    matches_inv: INV-04

  - assertion: 'ir.flags matches "CPC_OVERRIDE_"'
    description: Compliance flag matching pattern CPC_OVERRIDE_ must be emitted — generator should flag that CPC was uprated from declared
    severity: critical
