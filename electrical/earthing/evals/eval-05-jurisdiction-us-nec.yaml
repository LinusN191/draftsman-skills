# Eval 05 — Identical brief, but jurisdiction=US — must produce NEC-conformant design
# Category: jurisdiction_switch

name: eval-05-jurisdiction-us-nec
skill: earthing
category: jurisdiction_switch
description: |
  Single-family dwelling, but specified as a US project. The skill must:
  (a) Use NEC terminology (EGC, not CPC; grounding electrode system, not earth electrode array)
  (b) Size EGCs from NEC Table 250.122 by OCPD rating, NOT by phase CSA
  (c) Require supplemental grounding electrodes per NEC 250.50/250.53
  (d) Cite NEC 2023 articles, NOT BS 7671 regulations
  (e) Reference NFPA70/art250-grounding-bonding.json, not BS7671 files

input:
  jurisdiction: "US"
  earthing_system_declared: "TN-S"
  supply_voltage_v: 120
  supply_voltage_secondary_v: 240
  ze_ohm_declared: 0.20
  water_service_metallic: true
  gas_service_metallic: true
  extraneous_parts:
    - { kind: "concrete_encased_electrode", location: "footing UFER" }
    - { kind: "structural_steel", location: "frame" }
  met_location: "main service panel, garage"
  supplementary_bonding_required_locations: []
  consumed_intents:
    - { intent_type: "db-layout", intent_version: "1.0.0", produced_by: "electrical/db-layout/v1.0.0", payload_ref: "test-fixtures/db-layout-eval05.json" }

checks:
  - assertion: 'ir matches "earthing-ir.schema.json"'
    description: Output validates against the earthing IR schema
    severity: critical

  - assertion: 'ir.jurisdiction == "US"'
    description: Jurisdiction must be US
    severity: critical

  - assertion: 'ir.circuits[*].cpc.cpc_sizing_method all_equal "nec_table_250.122"'
    description: All circuits must use nec_table_250.122 CPC sizing method
    severity: critical

  - assertion: 'ir.electrodes.length >= 2'
    description: NEC requires supplemental grounding electrode system — at least 2 electrodes
    severity: critical

  - assertion: 'ir.earthing_system.code_clause matches "^NEC 2023 (Art|Table) 250\."'
    description: At least 2 citations match NEC 2023 Art/Table 250. pattern
    severity: warning

  - assertion: 'ir.earthing_system.code_clause not_contains "BS 7671"'
    description: Must NOT cite BS 7671 — US project must not cite UK regs
    severity: warning

  - assertion: 'ir.invariants[?(@.id=="INV-04")].passes == true'
    description: CPC method jurisdiction match
    severity: critical
    matches_inv: INV-04
