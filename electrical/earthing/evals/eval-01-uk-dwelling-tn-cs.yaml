# Eval 01 — UK dwelling, TN-C-S, all consumed-intent layers present
# Category: happy_path
# Standard refs: BS 7671:2018+A3, IEC 60617

name: eval-01-uk-dwelling-tn-cs
skill: earthing
category: happy_path
description: |
  Standard UK 3-bed semi-detached dwelling on PME supply. All four upstream skills
  (db-layout, lighting-layout, small-power, plus jurisdictional defaults) have
  produced their intents. Earthing skill must produce a complete TN-C-S schematic
  with correct Zs verification on every circuit.

input:
  jurisdiction: "GB"
  earthing_system_declared: "TN-C-S"
  supply_voltage_v: 230
  ze_ohm_declared: 0.35
  water_service_metallic: true
  gas_service_metallic: true
  extraneous_parts:
    - { kind: "structural_steel", location: "loft truss steel" }
  met_location: "consumer unit cupboard, ground floor hallway"
  supplementary_bonding_required_locations:
    - { kind: "bathroom", zone: "first_floor_main_bathroom" }
  consumed_intents:
    - { intent_type: "db-layout", intent_version: "1.0.0", produced_by: "electrical/db-layout/v1.0.0", payload_ref: "test-fixtures/db-layout-eval01.json" }
    - { intent_type: "lighting-layout", intent_version: "1.3.0", produced_by: "electrical/lighting-layout/v1.3.0", payload_ref: "test-fixtures/lighting-eval01.json" }
    - { intent_type: "small-power", intent_version: "1.0.0", produced_by: "electrical/small-power/v1.0.0", payload_ref: "test-fixtures/small-power-eval01.json" }

checks:
  - assertion: 'ir matches "earthing-ir.schema.json"'
    description: Output validates against the earthing IR schema
    severity: critical

  - assertion: 'ir.earthing_system == "TN-C-S"'
    description: Earthing system must be TN-C-S
    severity: critical

  - assertion: 'ir.jurisdiction == "GB"'
    description: Jurisdiction must be GB
    severity: critical

  - assertion: 'ir.met != null'
    description: Main earthing terminal (met) must be present
    severity: critical

  - assertion: 'ir.main_bonding.length >= 3'
    description: At least 3 main bonding conductors required — water + gas + structural_steel
    severity: critical

  - assertion: 'ir.supplementary_bonding.length >= 1'
    description: At least 1 supplementary bonding connection required — first_floor bathroom
    severity: critical

  # Tier 3 jsonpath_all_lte — parallel-array cross-field comparison
  # Semantics: Every circuit must satisfy Zs ≤ Zs_max (zs_calculated_ohm <= zs_max_ohm per circuit)
  # Note: canonical harness may not yet evaluate parallel-array comparisons; preserved as descriptive check
  - assertion: 'ir.circuits[*].zs_calculated_ohm <= ir.circuits[*].zs_max_ohm'
    description: Every circuit must satisfy Zs ≤ Zs_max — zs_calculated_ohm must not exceed zs_max_ohm for any circuit
    severity: critical
    matches_inv: INV-05

  - assertion: 'ir.invariants[?(@.id=="INV-05")].passes == true'
    description: Zs arithmetic
    severity: critical
    matches_inv: INV-05

  - assertion: 'ir.invariants[?(@.id=="INV-03")].passes == true'
    description: Bonding completeness
    severity: critical
    matches_inv: INV-03

  - assertion: 'ir.earthing_system.code_clause matches "^BS 7671:2018\+A3 Reg 411\."'
    description: At least 2 citations match BS 7671:2018+A3 Reg 411. pattern
    severity: warning

  - assertion: 'ir.rationale.sections[*].title contains "chat_summary"'
    description: "Rationale must include section: chat_summary"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "engineering_objectives"'
    description: "Rationale must include section: engineering_objectives"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "constraints"'
    description: "Rationale must include section: constraints"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "regulatory_basis"'
    description: "Rationale must include section: regulatory_basis"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "key_decisions"'
    description: "Rationale must include section: key_decisions"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "assumptions"'
    description: "Rationale must include section: assumptions"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "design_methodology"'
    description: "Rationale must include section: design_methodology"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "risks"'
    description: "Rationale must include section: risks"
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "evidence"'
    description: "Rationale must include section: evidence"
    severity: critical
