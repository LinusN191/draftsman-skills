# Eval 04 — TT system with soil_type unknown — generator must request, not invent
# Category: missing_input

name: eval-04-missing-soil-resistivity
skill: earthing
category: missing_input
description: |
  TT system. Engineer has not declared soil_type or electrode_measured_ra_ohm.
  The generator must NOT invent a value. It must either:
  (a) emit a compliance flag asking the engineer to provide soil data and Ra measurement, OR
  (b) emit electrodes[0].tool_call_pending: true with a clear note that Ra is required.

input:
  jurisdiction: "GB"
  earthing_system_declared: "TT"
  supply_voltage_v: 230
  ze_ohm_declared: null
  electrode_target_ra_ohm: 100
  electrode_measured_ra_ohm: null
  electrode_arrangement: null
  soil_type: null
  water_service_metallic: false
  gas_service_metallic: false
  extraneous_parts: []
  met_location: "service intake cupboard"
  supplementary_bonding_required_locations: []
  consumed_intents:
    - { intent_type: "db-layout", intent_version: "1.0.0", produced_by: "electrical/db-layout/v1.0.0", payload_ref: "test-fixtures/db-layout-eval04.json" }

checks:
  - assertion: 'ir matches "earthing-ir.schema.json"'
    description: Output validates against the earthing IR schema
    severity: critical

  - assertion: 'ir.compliance_summary.flags[*] != null'
    description: Generator must emit at least one compliance flag for missing soil/Ra data
    severity: warning

  - assertion: 'ir.compliance_summary.flags[*].code contains "ELECTRODE"'
    description: At least one compliance flag code must contain the substring ELECTRODE
    severity: warning

  # Tier 4 approximation: no_invented_values
  # Full semantics: EITHER electrodes[0].ra_ohm_specified is null AND electrodes[0].soil_resistivity_ohm_m is null
  #                 OR the skill emits TOOL-CALL-PENDING flag (or_tool_call_pending: true)
  # Generator must not invent soil data — engineer must provide Ra or the electrode must be marked tool_call_pending
  # TODO: full OR/AND semantics need runtime support
  - assertion: 'ir.flags matches "TOOL-CALL-PENDING"'
    description: >-
      EITHER the listed paths (electrodes[0].ra_ohm_specified, electrodes[0].soil_resistivity_ohm_m) are null
      OR the skill emits TOOL-CALL-PENDING flag — generator must not invent soil data; engineer must provide Ra
      or the electrode must be marked tool_call_pending.
    severity: warning
