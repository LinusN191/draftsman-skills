# Eval 02 — Rural UK dwelling, TT (no PME), all circuits need RCD
# Category: edge_case

name: eval-02-rural-tt-system
skill: earthing
category: edge_case
description: |
  Rural UK farm cottage. DNO has declined to provide PME earth. Installation is TT
  with a local rod electrode. Soil is loam, engineer declares Ra=85Ω after installation.
  Every final circuit must have RCD per BS 7671 411.5.3 to meet disconnection time.

input:
  jurisdiction: "GB"
  earthing_system_declared: "TT"
  supply_voltage_v: 230
  ze_ohm_declared: 85.0
  electrode_target_ra_ohm: 100
  electrode_measured_ra_ohm: 85.0
  electrode_arrangement: "single_rod_1200mm_copper_clad"
  soil_type: "loam"
  water_service_metallic: false
  gas_service_metallic: true
  extraneous_parts:
    - { kind: "gas_service_entry", location: "kitchen utility" }
  met_location: "boot room"
  supplementary_bonding_required_locations: []
  consumed_intents:
    - { intent_type: "db-layout", intent_version: "1.0.0", produced_by: "electrical/db-layout/v1.0.0", payload_ref: "test-fixtures/db-layout-eval02.json" }

checks:
  - assertion: 'ir matches "earthing-ir.schema.json"'
    description: Output validates against the earthing IR schema
    severity: critical

  - assertion: 'ir.earthing_system == "TT"'
    description: Earthing system must be TT
    severity: critical

  - assertion: 'ir.electrodes.length >= 1'
    description: At least one electrode entry must be present
    severity: critical

  - assertion: 'ir.electrodes[0].ra_ohm_specified <= 100'
    description: Ra below target (engineer-input value; calc.electrode_resistance pending per WI3)
    severity: critical

  - assertion: 'ir.circuits[*].rcd_required all_equal true'
    description: TT requires RCD on every circuit
    severity: critical

  - assertion: 'ir.invariants[?(@.id=="INV-06")].passes == true'
    description: RCD requirement check
    severity: critical
    matches_inv: INV-6

  - assertion: 'ir.earthing_system.code_clause matches "BS 7671:2018\+A3 Reg 411\.5\.3"'
    description: At least 1 citation matches BS 7671:2018+A3 Reg 411.5.3
    severity: warning

  - assertion: 'ir.flags matches "TOOL-CALL-PENDING"'
    description: calc.electrode_resistance is deferred — engineer-provided Ra accepted with pending flag
    severity: critical
