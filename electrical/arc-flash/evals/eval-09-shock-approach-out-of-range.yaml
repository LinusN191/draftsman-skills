name: eval-09-shock-approach-out-of-range
skill: arc-flash
category: skill_specific
description: |
  Voltage at 36 kV (in-range — last row of Table 130.4(C)(a)) vs 47 kV (out-of-range —
  beyond 46 kV row). Verifies edge-case handling.
  (Sub-category: shock_approach_edge_case)
input:
  jurisdiction: US
  project_supply: { voltage_v: 36000, phases: three, frequency_hz: 60 }
  cascade_declared:
    - id: "MV-36KV"
      parent_node_id: null
      node_kind: service_entrance
      designation: "36 kV substation — within table range"
      equipment: { type: "MV switchgear", current_type: ac, voltage_v: 36000 }
      fault_inputs: { ibf_ka_max: 25 }
      ocpd_inputs: { ocpd_type: "ACB_with_intentional_delay", t_clear_s: 0.5 }
      geometry: { working_distance_mm: 914 }
    - id: "MV-47KV"
      parent_node_id: null
      node_kind: service_entrance
      designation: "47 kV substation — out-of-range"
      equipment: { type: "MV switchgear", current_type: ac, voltage_v: 47000 }
      fault_inputs: { ibf_ka_max: 25 }
      ocpd_inputs: { ocpd_type: "ACB_with_intentional_delay", t_clear_s: 0.5 }
      geometry: { working_distance_mm: 914 }

checks:
  # per_node[0] — MV-36KV (in-range)
  - assertion: 'ir.nodes[?(@.node_id=="MV-36KV")].shock_approach_source contains "15.1 kV to 36 kV"'
    description: MV-36KV shock_approach_source references voltage row "15.1 kV to 36 kV" per Table 130.4(C)(a)
    severity: critical
    standard_ref: NFPA 70E Table 130.4(C)(a)

  # NOTE: regex match relies on runtime coercing numeric values to string; canonical grammar lacks an `in [N1, N2]` numeric-set operator.
  - assertion: 'ir.nodes[?(@.node_id=="MV-36KV")].shock_approach_restricted_mm matches "^(790|840)$"'
    description: MV-36KV restricted approach is 790 mm or 840 mm (Table 130.4(C)(a) row 15.1-36 kV or alt row)
    severity: critical
    standard_ref: NFPA 70E Table 130.4(C)(a)

  # per_node[1] — MV-47KV (out-of-range)
  - assertion: 'ir.nodes[?(@.node_id=="MV-47KV")].shock_approach_source contains "out_of_table_range"'
    description: MV-47KV shock_approach_source must mark "out_of_table_range" (47 kV beyond 46 kV row)
    severity: critical

  # non_compliance_flags_must_include — SHOCK_APPROACH_BEYOND_TABLE_RANGE
  # Note: original carried node_id: "MV-47KV" discriminator on flag — canonical grammar doesn't
  # express per-node flag scoping. Flag-presence check captures the essential claim.
  - assertion: 'ir.flags contains "SHOCK_APPROACH_BEYOND_TABLE_RANGE"'
    description: Compliance flag SHOCK_APPROACH_BEYOND_TABLE_RANGE must be emitted at error severity (scoped to MV-47KV — per-node flag scoping not enforceable by canonical grammar)
    severity: critical

  # pass_criteria coverage:
  # "Skill doesn't silently extrapolate beyond table range" + "Engineer must supply approach distances manually for >46 kV"
  # — captured by the out_of_table_range source + error flag above.
