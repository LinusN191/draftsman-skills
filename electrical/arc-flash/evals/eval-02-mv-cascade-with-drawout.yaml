name: eval-02-mv-cascade-with-drawout
skill: arc-flash
category: edge_case
description: |
  11kV MV switchgear with drawout breakers (HCB electrode config) cascaded to 400V LV.
  Tests voltage-class crossing (14300V class for MV → 600V class for LV) + interleaved
  electrode configs (HCB at MV, VCB at LV). Verifies different methods/configs in one cascade.
input:
  jurisdiction: INT
  project_supply: { voltage_v: 11000, phases: three, frequency_hz: 50 }
  cascade_declared:
    - id: "MV-SWB"
      parent_node_id: null
      node_kind: service_entrance
      designation: "11 kV switchboard 1600A — drawout breakers"
      equipment: { type: "drawout switchgear", current_type: ac, voltage_v: 11000 }
      fault_inputs: { ibf_ka_max: 12, x_over_r: 15 }
      ocpd_inputs: { ocpd_type: "ACB_with_intentional_delay", t_clear_s: 0.5 }
      geometry: { working_distance_mm: 910 }
    - id: "MV-SWB.TX-1.LV-MSB"
      parent_node_id: "MV-SWB"
      node_kind: feeder
      designation: "LV MSB 3200A (downstream of 11kV/400V transformer)"
      equipment: { type: "LV switchgear", current_type: ac, voltage_v: 400 }
      fault_inputs: { ibf_ka_max: 35, x_over_r: 8 }
      ocpd_inputs: { ocpd_type: "ACB_electronic", t_clear_s: 0.3 }
      geometry: { working_distance_mm: 455 }

checks:
  # per_node[0] — MV-SWB (MV drawout switchgear → HCB + 14300V class)
  - assertion: 'ir.cascade[?(@.node_id=="MV-SWB")].equipment.voltage_class == "14300V"'
    description: MV-SWB voltage_class resolves to 14300V (IEEE 1584:2018 MV class)
    severity: critical
    standard_ref: IEEE 1584:2018

  - assertion: 'ir.cascade[?(@.node_id=="MV-SWB")].equipment.electrode_config == "HCB"'
    description: MV-SWB electrode_config auto-inferred to HCB (drawout switchgear)
    severity: critical

  - assertion: 'ir.cascade[?(@.node_id=="MV-SWB")].equipment.electrode_config_source == "auto_inferred_from_equipment_type"'
    description: MV-SWB electrode_config_source records auto-inferred path
    severity: critical

  - assertion: 'ir.cascade[?(@.node_id=="MV-SWB")].shock_approach.source contains "751V to 15 kV"'
    description: MV-SWB shock_approach_source must reference voltage row "751V to 15 kV"
    severity: critical
    standard_ref: NFPA 70E Table 130.4(C)(a)

  - assertion: 'ir.cascade[?(@.node_id=="MV-SWB")].shock_approach.restricted_approach_mm == 660'
    description: MV-SWB restricted approach is 660 mm per Table 130.4(C)(a) row 751V-15kV
    severity: critical
    standard_ref: NFPA 70E Table 130.4(C)(a)

  # per_node[1] — MV-SWB.TX-1.LV-MSB (LV switchgear → VCB + 600V class)
  - assertion: 'ir.cascade[?(@.node_id=="MV-SWB.TX-1.LV-MSB")].equipment.voltage_class == "600V"'
    description: LV-MSB voltage_class resolves to 600V (IEEE 1584:2018 LV class)
    severity: critical
    standard_ref: IEEE 1584:2018

  - assertion: 'ir.cascade[?(@.node_id=="MV-SWB.TX-1.LV-MSB")].equipment.electrode_config == "VCB"'
    description: LV-MSB electrode_config auto-inferred to VCB (LV switchgear)
    severity: critical

  - assertion: 'ir.cascade[?(@.node_id=="MV-SWB.TX-1.LV-MSB")].shock_approach.source contains "151V to 750V"'
    description: LV-MSB shock_approach_source must reference voltage row "151V to 750V"
    severity: critical
    standard_ref: NFPA 70E Table 130.4(C)(a)

  # pass_criteria coverage:
  # "Cascade tree consistent (parent_node_id resolves)" — observable
  - assertion: 'ir.cascade[?(@.node_id=="MV-SWB.TX-1.LV-MSB")].parent_node_id == "MV-SWB"'
    description: LV-MSB parent_node_id resolves to MV-SWB (cascade tree consistent)
    severity: critical
