name: eval-06-rationale-block
skill: arc-flash
category: rationale_block
description: |
  Verify the rationale block conforms to WI2: exactly 8 sections + chat_summary + every
  decision cites a rule + clause. Reuses eval-01 scenario.
input:
  reuse_from: "electrical/arc-flash/evals/eval-01-uk-lv-switchboard-happy-path.yaml"

checks:
  # rationale.chat_summary.max_length_chars
  - assertion: 'ir.rationale.chat_summary.length <= 1200'
    description: Chat summary must be ≤ 1200 chars per WI2
    severity: warning

  # rationale.chat_summary.max_words — no canonical word-count operator.
  # Emit info-level check capturing the constraint for runtime word-count audit.
  - assertion: 'ir.rationale.chat_summary != null'
    description: Chat summary expected ≤ 200 words — runtime word-count check pending (canonical grammar lacks word-count operator)
    severity: info

  # rationale.sections.length
  - assertion: 'ir.rationale.sections.length == 8'
    description: Exactly 8 rationale sections expected per WI2
    severity: critical

  # rationale.sections.titles_in_order — emit per-title contains checks (order not enforceable)
  - assertion: 'ir.rationale.sections[*].title contains "Input Ingestion"'
    description: 'Rationale must include section: Input Ingestion (position 1 expected — order not enforced by canonical grammar)'
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Cascade Topology"'
    description: 'Rationale must include section: Cascade Topology (position 2 expected — order not enforced by canonical grammar)'
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Jurisdictional Framing"'
    description: 'Rationale must include section: Jurisdictional Framing (position 3 expected — order not enforced by canonical grammar)'
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Method Selection Summary"'
    description: 'Rationale must include section: Method Selection Summary (position 4 expected — order not enforced by canonical grammar)'
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Per-node Arc-Flash Results"'
    description: 'Rationale must include section: Per-node Arc-Flash Results (position 5 expected — order not enforced by canonical grammar)'
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Shock-Approach Boundaries"'
    description: 'Rationale must include section: Shock-Approach Boundaries (position 6 expected — order not enforced by canonical grammar)'
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Label Recommendations"'
    description: 'Rationale must include section: Label Recommendations (position 7 expected — order not enforced by canonical grammar)'
    severity: critical

  - assertion: 'ir.rationale.sections[*].title contains "Compliance + Assumptions + Tool-call Status"'
    description: 'Rationale must include section: Compliance + Assumptions + Tool-call Status (position 8 expected — order not enforced by canonical grammar)'
    severity: critical

  # TODO: every_decision_has: [label, summary, rule, code_clause] — canonical grammar cannot
  # enforce per-decision multi-field presence. Logged as warning.
  - assertion: 'ir.rationale.sections[*].decisions != null'
    description: Every rationale section must have decisions[] populated (full label/summary/rule/code_clause structure not enforceable by canonical grammar — see WI2)
    severity: warning

  # pass_criteria coverage:
  # "Every decision cites a rule + clause from IEEE 1584 or NFPA 70E" — observable as
  # substring presence in chat_summary
  - assertion: 'ir.rationale.chat_summary matches "(IEEE 1584|NFPA 70E)"'
    description: Chat summary must reference at least one of IEEE 1584 or NFPA 70E
    severity: critical
