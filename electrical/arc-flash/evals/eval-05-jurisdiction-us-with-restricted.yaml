name: eval-05-jurisdiction-us-with-restricted
skill: arc-flash
category: jurisdiction_switch
description: |
  US industrial cascade with one node having very high fault current + slow OCPD → IE > 40
  cal/cm². Skill emits INCIDENT_ENERGY_GT_40_RESTRICTED error + ppe_category: null. Tests
  the restricted-equipment path.
input:
  jurisdiction: US
  project_supply: { voltage_v: 480, phases: three, frequency_hz: 60 }
  cascade_declared:
    - id: "MSB-RESTRICTED"
      parent_node_id: null
      node_kind: service_entrance
      designation: "480V service entrance — high fault current + slow ACB"
      equipment: { type: "metal-clad switchgear", current_type: ac, voltage_v: 480 }
      fault_inputs: { ibf_ka_max: 65, x_over_r: 10 }
      ocpd_inputs: { ocpd_type: "ACB_with_intentional_delay", t_clear_s: 0.5 }
      geometry: { working_distance_mm: 455 }

checks:
  # per_node[0] — MSB-RESTRICTED
  - assertion: 'ir.nodes[?(@.node_id=="MSB-RESTRICTED")].incident_energy_cal_per_cm2 > 40'
    description: MSB-RESTRICTED IE must be > 40 cal/cm² (high Ibf + slow OCPD)
    severity: critical

  - assertion: 'ir.nodes[?(@.node_id=="MSB-RESTRICTED")].ppe_category == null'
    description: MSB-RESTRICTED ppe_category is null (no Cat 5 in NFPA 70E)
    severity: critical
    standard_ref: NFPA 70E

  # non_compliance_flags_must_include — INCIDENT_ENERGY_GT_40_RESTRICTED
  - assertion: 'ir.flags contains "INCIDENT_ENERGY_GT_40_RESTRICTED"'
    description: Compliance flag INCIDENT_ENERGY_GT_40_RESTRICTED must be emitted at error severity
    severity: critical

  # pass_criteria coverage:
  # "shock_approach still populated (separate concern)"
  # shock_approach.source is REQUIRED per arc-flash-ir.schema.json; assertion deleted as redundant (Sprint 3-W2b).
