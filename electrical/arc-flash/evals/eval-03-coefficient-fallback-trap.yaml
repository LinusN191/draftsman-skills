name: eval-03-coefficient-fallback-trap
skill: arc-flash
category: validation_trap
description: |
  IEEE 1584:2018 coefficients are null (pending-verification) for one or more (voltage_class,
  electrode_config) pairs. Skill MUST fall back to Lee 1982 (or NFPA 70E table) AND record
  the trail AND emit the LEE_1982_FALLBACK_USED flag. Verifies the fallback chain doesn't
  silently fail with null IE.
input:
  jurisdiction: US
  project_supply: { voltage_v: 480, phases: three, frequency_hz: 60 }
  simulated_environment:
    ieee1584_2018_coefficients_available: false
    ieee1584_2002_coefficients_available: false
  cascade_declared:
    - id: "PNL-A1"
      parent_node_id: null
      node_kind: final_circuit
      designation: "480V panelboard PNL-A1"
      equipment: { type: "LV panelboard", current_type: ac, voltage_v: 480 }
      fault_inputs: { ibf_ka_max: 30 }
      ocpd_inputs: { ocpd_type: "MCCB_thermal_magnetic", t_clear_s: 0.2 }
      geometry: { working_distance_mm: 455 }

checks:
  # per_node[0] — PNL-A1
  - assertion: 'ir.nodes[?(@.node_id=="PNL-A1")].method_applied == "lee_1982"'
    description: PNL-A1 method_applied = lee_1982 (not pending — fallback chain worked)
    severity: critical

  # method_fallback_trail_length_min: 3
  - assertion: 'ir.nodes[?(@.node_id=="PNL-A1")].method_fallback_trail.length >= 3'
    description: PNL-A1 method_fallback_trail must have ≥3 entries (records IEEE 1584:2018 skip, IEEE 1584:2002 skip, Lee 1982 applied)
    severity: critical

  # method_fallback_trail_must_contain — array of {method, result} dicts.
  # TODO: Canonical grammar cannot express "array contains object with these field values".
  # Best-available: assert that the trail mentions each expected method as substring on the
  # serialised JSON path. Flagged as warning.
  - assertion: 'ir.nodes[?(@.node_id=="PNL-A1")].method_fallback_trail contains "ieee1584_2018"'
    description: PNL-A1 method_fallback_trail must include attempt of ieee1584_2018 (object-membership check approximated as substring — canonical grammar lacks array-of-objects predicate)
    severity: warning

  - assertion: 'ir.nodes[?(@.node_id=="PNL-A1")].method_fallback_trail contains "ieee1584_2002"'
    description: PNL-A1 method_fallback_trail must include attempt of ieee1584_2002 (object-membership check approximated as substring)
    severity: warning

  - assertion: 'ir.nodes[?(@.node_id=="PNL-A1")].method_fallback_trail contains "lee_1982"'
    description: PNL-A1 method_fallback_trail must include lee_1982 as applied method
    severity: warning

  - assertion: 'ir.nodes[?(@.node_id=="PNL-A1")].method_fallback_trail contains "skipped"'
    description: PNL-A1 method_fallback_trail must include "skipped" result for at least one attempt
    severity: warning

  - assertion: 'ir.nodes[?(@.node_id=="PNL-A1")].method_fallback_trail contains "applied"'
    description: PNL-A1 method_fallback_trail must include "applied" result for the final attempt
    severity: warning

  # incident_energy_cal_per_cm2_gt: 1.0
  - assertion: 'ir.nodes[?(@.node_id=="PNL-A1")].incident_energy_cal_per_cm2 > 1.0'
    description: PNL-A1 IE must be > 1.0 cal/cm² (Lee 1982 produces conservative upper bound)
    severity: critical

  # arc_flash_boundary_mm_gt: 455
  - assertion: 'ir.nodes[?(@.node_id=="PNL-A1")].arc_flash_boundary_mm > 455'
    description: PNL-A1 arc_flash_boundary_mm must be > 455 mm (Lee 1982 conservative)
    severity: critical

  # non_compliance_flags_must_include — LEE_1982_FALLBACK_USED
  - assertion: 'ir.flags contains "LEE_1982_FALLBACK_USED"'
    description: Compliance flag LEE_1982_FALLBACK_USED must be emitted at info severity
    severity: info

  # pass_criteria coverage:
  # "No silent failure — engineer sees the fallback chain" — captured by trail-length + per-method substring checks above.
