# Voltage drop targets per jurisdiction
# Consumed by generator (Step 8) + validator (INV-05)

rules:
  - id: VD-01
    jurisdiction: [GB]
    standard_reference: "BS 7671:2018+A2:2022 Appendix 12"
    rule_text: "Lighting circuits Vd ≤ 3% of nominal voltage"
    applies_to: cascade_node
    enforcement: hard_fail

  - id: VD-02
    jurisdiction: [GB]
    standard_reference: "BS 7671:2018+A2:2022 Appendix 12"
    rule_text: "Power circuits Vd ≤ 5% of nominal voltage"
    applies_to: cascade_node
    enforcement: hard_fail

  - id: VD-03
    jurisdiction: [KE]
    standard_reference: "KS 1700:2018 §313 routes to BS 7671:2018+A2:2022 Appendix 12"
    rule_text: "KE limits follow BS 7671 routing — lighting ≤ 3%, power ≤ 5%"
    applies_to: cascade_node
    enforcement: hard_fail

  - id: VD-04
    jurisdiction: [INT, EU]
    standard_reference: "IEC 60364-5-52:2009 §G"
    rule_text: "INT/EU: lighting ≤ 3%, power ≤ 5%"
    applies_to: cascade_node
    enforcement: hard_fail

  - id: VD-05
    jurisdiction: [US]
    standard_reference: "NEC 2023 Article 215.2(A)(1) Informational Note 2"
    rule_text: "US feeder-only ≤ 3%, combined feeder+branch ≤ 5%"
    applies_to: cascade_node
    enforcement: hard_fail

  - id: VD-06
    jurisdiction: [all]
    standard_reference: "Engineer override"
    rule_text: "vd_target_overrides[node_id] takes precedence when client spec is tighter than jurisdictional default"
    applies_to: cascade_node
    enforcement: algorithm_step
