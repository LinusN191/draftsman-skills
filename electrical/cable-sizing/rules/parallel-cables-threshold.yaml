# Parallel cables threshold rules
# Consumed by generator (Step 11) + validator (INV-08)

rules:
  - id: PAR-01
    jurisdiction: [all]
    standard_reference: "DraftsMan walk-the-ladder convention"
    rule_text: "Engage parallel when single-cable ladder exhausted at largest csa with Iz < In"
    applies_to: cascade_node
    enforcement: algorithm_step

  - id: PAR-02
    jurisdiction: [GB, KE, INT, EU]
    standard_reference: "IEC 60364-5-52:2009 §523.6"
    rule_text: "Minimum csa per parallel = 50 mm² for IEC jurisdictions"
    applies_to: cascade_node
    enforcement: hard_fail

  - id: PAR-03
    jurisdiction: [US]
    standard_reference: "NEC 2023 Article 310.10(H)(1)"
    rule_text: "Minimum csa per parallel = 1/0 AWG for NEC jurisdiction"
    applies_to: cascade_node
    enforcement: hard_fail

  - id: PAR-04
    jurisdiction: [all]
    standard_reference: "IEC 60364-5-52 §523.6 / NEC 310.10(H)"
    rule_text: "All parallels MUST match on length + csa + material + installation method (symmetric impedances → balanced current sharing)"
    applies_to: cascade_node
    enforcement: hard_fail
