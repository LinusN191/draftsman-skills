# Correction factor stack rules for cable-sizing
# Consumed by generator (Step 6) + calc.cable_ampacity

rules:
  - id: CF-01
    jurisdiction: [all]
    standard_reference: "BS 7671:2018+A2:2022 App 4 / IEC 60364-5-52 Annex B / NEC 2023 Article 310.15"
    rule_text: "Stack order: Ca × Cg × Ci × Ch — applied multiplicatively to Iz_tabulated"
    applies_to: cascade_node
    enforcement: algorithm_step

  - id: CF-02
    jurisdiction: [GB, KE, INT, EU]
    standard_reference: "BS 7671:2018+A2:2022 App 4 §4 / IEC 60364-5-52:2009 Annex B Table B.52.14"
    rule_text: "Ca (ambient correction) per declared ambient_c"
    applies_to: cascade_node
    enforcement: algorithm_step

  - id: CF-03
    jurisdiction: [GB, KE, INT, EU]
    standard_reference: "BS 7671:2018+A2:2022 App 4 Table 4C / IEC 60364-5-52:2009 Annex B Table B.52.17"
    rule_text: "Cg (grouping correction) per declared grouping_count"
    applies_to: cascade_node
    enforcement: algorithm_step

  - id: CF-04
    jurisdiction: [GB, KE, INT, EU]
    standard_reference: "BS 7671:2018+A2:2022 App 4 §4"
    rule_text: "Ci = 0.5 when in_thermal_insulation == true"
    applies_to: cascade_node
    enforcement: algorithm_step

  - id: CF-05
    jurisdiction: [US]
    standard_reference: "NEC 2023 Article 310.15(B)(1) + (B)(3)(a)"
    rule_text: "US correction = Ca × Cg (separate ambient and grouping multipliers)"
    applies_to: cascade_node
    enforcement: algorithm_step
