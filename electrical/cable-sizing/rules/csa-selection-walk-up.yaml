# CSA selection walk-up rules for cable-sizing
# Consumed by generator (Steps 6-7) + validator (INV-03)

rules:
  - id: WALK-01
    jurisdiction: [all]
    standard_reference: "BS 7671:2018+A2:2022 App 4 / IEC 60364-5-52:2009 Annex B / NEC 2023 Article 310.16"
    rule_text: "Start csa = smallest where Iz_tabulated × correction_factors ≥ In"
    applies_to: cascade_node
    enforcement: algorithm_step

  - id: WALK-02
    jurisdiction: [all]
    standard_reference: "BS 7671:2018+A2:2022 / IEC 60364 / NEC 2023 (composite)"
    rule_text: "Walk-up condition = any of {iz_vs_in, vd_cumulative, motor_starting_vd, cpc_adiabatic, harmonic_derating} fails"
    applies_to: cascade_node
    enforcement: algorithm_step

  - id: WALK-03
    jurisdiction: [all]
    standard_reference: "BS 7671:2018+A2:2022 / IEC 60364 / NEC 2023 (composite)"
    rule_text: "Accept condition = all 5 checks pass at current csa"
    applies_to: cascade_node
    enforcement: algorithm_step

  - id: WALK-04
    jurisdiction: [all]
    standard_reference: "DraftsMan walk_up_trail convention"
    rule_text: "binding_constraint = the rejection reason at csa_one_below_selected (or 'iz_vs_in' if accepted at start csa with no walk-up)"
    applies_to: cascade_node
    enforcement: algorithm_step

  - id: WALK-05
    jurisdiction: [US]
    standard_reference: "NEC 2023 Article 110.14(C)"
    rule_text: "NEC terminal-temp cap applied after Ca × Cg correction — ampacity column selection limited by terminal temp rating (60/75/90 °C)"
    applies_to: cascade_node
    enforcement: algorithm_step

  - id: WALK-06
    jurisdiction: [all]
    standard_reference: "BS 7671:2018+A2:2022 App 4 / IEC 60364-5-52 / NEC 2023 Chapter 9 Table 8"
    rule_text: "Standard ladders: mm² ladder [1.0, 1.5, 2.5, 4, 6, 10, 16, 25, 35, 50, 70, 95, 120, 150, 185, 240, 300, 400, 500, 630] for GB/EU/INT/KE; AWG/kcmil ladder per NEC Chapter 9 Table 8 for US"
    applies_to: cascade_node
    enforcement: algorithm_step
