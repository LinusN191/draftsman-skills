name: eval-04-missing-route-data
skill: electrical/cable-sizing
description: |
  Missing-input handling: when route data (length_m / installation_method)
  is not declared and no intent is consumed, the skill MUST emit
  tool_call_pending: true rather than invent values. Verifies that the
  UK example output has tool_call_pending uniformly true across all nodes
  AND carries the 3 TOOL-CALL-PENDING flags at the IR level.
category: missing_input
input_fixtures:
  - ../examples/uk-domestic-final-circuits/output.json

checks:
  - assertion: "all(n.checks.tool_call_pending == True for n in output.cascade)"
    description: Every cascade node has tool_call_pending true (WI3 deferral)
    severity: critical
    matches_inv: INV-09

  - assertion: "'TOOL-CALL-PENDING:calc.cable_ampacity' in output.flags"
    description: cable-ampacity tool deferral flag present
    severity: critical

  - assertion: "'TOOL-CALL-PENDING:calc.voltage_drop' in output.flags"
    description: voltage-drop tool deferral flag present
    severity: critical

  - assertion: "'TOOL-CALL-PENDING:calc.cpc_adiabatic' in output.flags"
    description: cpc-adiabatic tool deferral flag present
    severity: critical
