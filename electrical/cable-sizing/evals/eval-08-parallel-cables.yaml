name: eval-08-parallel-cables
skill: electrical/cable-sizing
description: |
  Skill-specific: parallel cables. INT TX-1 (2 × 500 mm²), US SERVICE.1200A
  (4 × 350 kcmil), US MCC-1.M01 (2 × 500 kcmil). Verifies parallel_count ≥ 2
  and minimum-csa-per-parallel rule (50 mm² IEC / 1/0 AWG US).
category: skill_specific
input_fixtures:
  - ../examples/intl-commercial-with-feeders/output.json
  - ../examples/us-industrial-with-motors/output.json

checks:
  - assertion: "any(n.selection.parallel_count >= 2 for n in output.cascade)"
    description: At least one parallel-cable node in each example
    severity: critical
    matches_inv: INV-08

  - assertion: "all(n.selection.binding_constraint == 'parallel_required' for n in output.cascade if n.selection.parallel_count >= 2)"
    description: Parallel nodes carry binding_constraint == 'parallel_required'
    severity: critical
    matches_inv: INV-08

  - assertion: "all(n.selection.parallel_count <= 6 for n in output.cascade)"
    description: parallel_count never exceeds 6 (engineer should redesign with busbar above 6)
    severity: critical
