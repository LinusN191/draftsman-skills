name: eval-06-rationale-block
skill: electrical/cable-sizing
description: |
  Rationale block compliance across all 4 jurisdictional examples. Verifies
  WI2 contract: 8-section structure, chat_summary 40-500 chars, all section
  summaries ≤400 chars (rationale schema enforces).
category: rationale_block
input_fixtures:
  - ../examples/uk-domestic-final-circuits/output.json
  - ../examples/ke-nairobi-commercial-with-msb/output.json
  - ../examples/intl-commercial-with-feeders/output.json
  - ../examples/us-industrial-with-motors/output.json

checks:
  - assertion: "len(output.rationale.sections) == 8"
    description: All examples have 8 rationale sections
    severity: critical

  - assertion: "40 <= len(output.rationale.chat_summary) <= 500"
    description: chat_summary 40-500 chars on every example
    severity: critical

  - assertion: "all(len(s.summary) <= 400 for s in output.rationale.sections)"
    description: Every section.summary ≤ 400 chars (rationale schema cap)
    severity: critical

  - assertion: "[s.title for s in output.rationale.sections] == ['Project Supply + Jurisdiction', 'Cascade Tree + Topology', 'Walk-the-Ladder Approach + Binding Constraints', 'Cumulative Voltage Drop', 'CPC Adiabatic Sizing', 'Motor Starting + Parallel Cables + Harmonic Derating', 'Compliance + Assumptions + Tool-Call Pending', 'Cross-Skill Contract']"
    description: 8 section titles match exact order
    severity: critical
