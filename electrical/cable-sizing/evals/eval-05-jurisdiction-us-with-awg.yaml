name: eval-05-jurisdiction-us-with-awg
skill: electrical/cable-sizing
description: |
  Jurisdiction switch: US 5-node cascade with AWG/kcmil sizing, aluminium
  feeder, terminal-temp cap, and parallel cables. Verifies all csa strings
  match AWG/kcmil ladder, material includes aluminium, and no BS 7671 or
  IEC 60364 primary citations appear.
category: jurisdiction_switch
input_fixtures:
  - ../examples/us-industrial-with-motors/output.json

checks:
  - assertion: "output.jurisdiction == 'US'"
    description: US example carries jurisdiction == 'US'
    severity: critical

  - assertion: "any(n.selection.material == 'aluminium' for n in output.cascade)"
    description: At least one cascade node uses aluminium feeder (NEC industrial convention)
    severity: critical

  - assertion: "all(isinstance(n.selection.phase_csa, str) for n in output.cascade)"
    description: All phase_csa values are AWG/kcmil strings (not mm² numbers) in US example
    severity: critical
    matches_inv: INV-03

  - assertion: "next(n for n in output.cascade if n.node_id == 'SERVICE.1200A').selection.parallel_count >= 2"
    description: SERVICE.1200A uses parallel cables
    severity: critical
    matches_inv: INV-08

  - assertion: "next(n for n in output.cascade if n.node_id == 'SERVICE.1200A').selection.binding_constraint == 'parallel_required'"
    description: SERVICE.1200A binding_constraint is parallel_required
    severity: critical
