name: eval-03-undersized-cable-trap
skill: electrical/cable-sizing
description: |
  Validation trap: synthetic fixture where engineer-declared phase_csa is
  forced one ladder step too small. The validator MUST flag INV-05
  (vd_cumulative violation) when the UK C03 lighting circuit is artificially
  reverted from 1.5 mm² to 1.0 mm². Note: this eval is intentionally
  synthetic — the shipped UK example output.json is the baseline; a real
  runtime would mutate it and re-validate. The eval here asserts that the
  shipped example does NOT have this defect AND that the walk_up_trail
  records the rejected 1.0 mm² attempt.
category: validation_trap
input_fixtures:
  - ../examples/uk-domestic-final-circuits/output.json

checks:
  - assertion: "next(n for n in output.cascade if n.node_id == 'CU-MAIN.C03').selection.phase_csa == 1.5"
    description: UK C03 lighting circuit accepted at 1.5 mm² (not 1.0 mm²)
    severity: critical

  - assertion: "len(next(n for n in output.cascade if n.node_id == 'CU-MAIN.C03').selection.walk_up_trail) >= 2"
    description: C03 walk_up_trail has multiple entries showing the 1.0 mm² rejection
    severity: critical

  - assertion: "any(e.csa_attempted == 1.0 and e.accepted == False and e.rejected_by == 'vd_cumulative' for e in next(n for n in output.cascade if n.node_id == 'CU-MAIN.C03').selection.walk_up_trail)"
    description: C03 walk_up_trail records 1.0 mm² rejection with rejected_by=vd_cumulative
    severity: critical
    matches_inv: INV-05
