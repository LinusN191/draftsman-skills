name: eval-09-harmonic-derating-data-centre
skill: electrical/cable-sizing
description: |
  Skill-specific: harmonic derating for 3-phase 4-wire IT loads. The INT
  RISER.L3.C07 server rack (30% h3 triplen) has harmonic_ch_applied < 1.0
  AND binding_constraint == 'harmonic_derating'. Triggered by IEC 60364-5-52
  Annex E §E.5 when h3 > 15% on a 3-phase 4-wire circuit.
category: skill_specific
input_fixtures:
  - ../examples/intl-commercial-with-feeders/output.json

checks:
  - assertion: "next(n for n in output.cascade if n.node_id == 'RISER.L3.C07').harmonic_content_pct >= 15"
    description: L3.C07 carries declared h3 ≥ 15%
    severity: critical

  - assertion: "next(n for n in output.cascade if n.node_id == 'RISER.L3.C07').load.phases == 'three_phase_4wire'"
    description: L3.C07 is 3-phase 4-wire (carries triplen on neutral)
    severity: critical

  - assertion: "next(n for n in output.cascade if n.node_id == 'RISER.L3.C07').checks.harmonic_ch_applied < 1.0"
    description: Harmonic derating Ch < 1.0 applied on L3.C07
    severity: critical

  - assertion: "next(n for n in output.cascade if n.node_id == 'RISER.L3.C07').selection.binding_constraint == 'harmonic_derating'"
    description: L3.C07 binding_constraint == 'harmonic_derating'
    severity: critical
