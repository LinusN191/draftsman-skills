name: eval-07-motor-starting-vd
skill: electrical/cable-sizing
description: |
  Skill-specific: motor-starting Vd check. KE chiller pump M01 (7.5 kW IEC AB)
  and US 500 hp M01 (NEMA Design B) both have motor_starting_vd_pct populated
  AND within 10% advisory limit. Non-motor loads have null motor_starting_vd_pct.
category: skill_specific
input_fixtures:
  - ../examples/ke-nairobi-commercial-with-msb/output.json
  - ../examples/us-industrial-with-motors/output.json

checks:
  - assertion: "all((n.checks.motor_starting_vd_pct is None) == (n.load.load_type != 'motor') for n in output.cascade)"
    description: motor_starting_vd_pct populated iff load_type == 'motor'
    severity: critical
    matches_inv: INV-07

  - assertion: "all(n.checks.motor_starting_vd_pct <= 10.0 for n in output.cascade if n.load.load_type == 'motor')"
    description: All motor-starting Vd ≤ 10% (warning limit)
    severity: critical

  - assertion: "all('lra_factor' in n.load.get('load_class_motor', {}) for n in output.cascade if n.load.load_type == 'motor')"
    description: Motor nodes have load_class_motor.lra_factor populated
    severity: critical
    matches_inv: INV-07
