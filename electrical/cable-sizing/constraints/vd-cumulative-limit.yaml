# Cumulative voltage drop constraints
# Hard checks enforced by validator INV-05

constraints:
  - id: VDC-01
    description: "Cumulative Vd ≤ limit on every cascade node"
    rule: "for each node: node.checks.vd_cumulative_pct ≤ node.checks.vd_limit_pct"
    enforcement: hard_fail
    matches_inv: INV-05
    standards: ["BS 7671:2018+A2:2022 Appendix 12", "IEC 60364-5-52:2009 §G", "NEC 2023 Article 215.2(A)(1) IN 2"]

  - id: VDC-02
    description: "vd_cumulative_pct = parent_chain.vd_segment_pct sum within ±0.05% tolerance"
    rule: "for each leaf node: vd_cumulative_pct == sum(parent_chain.vd_segment_pct + this.vd_segment_pct) ± 0.05%"
    enforcement: hard_fail
    standards: ["DraftsMan math integrity check"]
