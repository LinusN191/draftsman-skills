# Iz vs In vs Ib constraints for cable-sizing IR
# Hard checks enforced by validator INV-04

constraints:
  - id: IZ-01
    description: "Ib ≤ In ≤ Iz on every cascade node"
    rule: "for each node: node.load.ib_a ≤ node.load.in_a ≤ node.checks.iz_corrected_a"
    enforcement: hard_fail
    matches_inv: INV-04
    standards: ["BS 7671:2018+A2:2022 Reg 433.1", "IEC 60364-4-43:2017 §433.1", "NEC 2023 Article 240.4(B)"]
