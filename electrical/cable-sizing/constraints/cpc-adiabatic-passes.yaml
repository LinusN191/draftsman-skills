# CPC adiabatic constraints
# Hard checks enforced by validator INV-06

constraints:
  - id: CPC-01
    description: "CPC adiabatic passes OR binding_constraint=cpc_adiabatic (phase upsized to permit larger CPC)"
    rule: "for each node: node.checks.cpc_adiabatic_pass == true OR node.selection.binding_constraint == 'cpc_adiabatic'"
    enforcement: hard_fail
    matches_inv: INV-06
    standards: ["BS 7671:2018+A2:2022 Reg 543.1.3", "IEC 60364-5-54:2011 §543", "NEC 2023 Article 250.122"]

  - id: CPC-02
    description: "Adiabatic formula reference"
    rule: "S = sqrt(I²t) / k — informational reference per IEC 60364-5-54 §543.1.2"
    enforcement: informational
    standards: ["IEC 60364-5-54:2011 §543.1.2"]
