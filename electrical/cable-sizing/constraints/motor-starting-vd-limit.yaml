# Motor-starting voltage drop constraints
# Warning checks (engineer may resolve with VFD/soft-start) enforced by validator INV-07

constraints:
  - id: MS-01
    description: "Motor starting Vd ≤ 10% (warning, not hard fail)"
    rule: "for each motor node: node.checks.motor_starting_vd_pct ≤ 10.0"
    enforcement: warning
    matches_inv: INV-07
    standards: ["BS 7671:2018+A2:2022 §525.1 + Table 4Ab note 5", "IEC 60364-5-52:2009 §525.1", "NEC 2023 Article 430.6(A)(1) + NEMA MG-1"]

  - id: MS-02
    description: "Motor nodes have load_class_motor populated with lra_factor"
    rule: "for each motor node: load.load_class_motor.lra_factor populated when load_type == motor"
    enforcement: hard_fail
    matches_inv: INV-07
    standards: ["NEMA MG-1", "IEC 60034-1"]
