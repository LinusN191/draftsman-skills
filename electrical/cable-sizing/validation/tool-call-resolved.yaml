# Tool-call resolved validation
# Checked by validator INV-09

validations:
  - id: TC-01
    description: "Tool-call consistency: all nodes have tool_call_pending==true OR all 3 calc tool outputs populated"
    rule: |
      for each node:
        node.checks.tool_call_pending == true
        OR (node.checks.iz_corrected_a populated AND node.checks.vd_cumulative_pct populated AND node.checks.cpc_adiabatic_pass populated)
    enforcement: hard_fail
    matches_inv: INV-09
    fail_message: "TC-01: tool_call_pending state inconsistent — mixed states across cascade not permitted in v1.0"
