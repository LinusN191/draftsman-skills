# Intent shape validation per refresh §2 (extended for Zs helper fields)
# Checked by validator INV-10

validations:
  - id: INT-01
    description: "Emitted cable-sizing intent validates against cable-sizing-intent.schema.json"
    rule: "JSONSchema.validate(intent, cable-sizing-intent.schema.json)"
    enforcement: hard_fail
    matches_inv: INV-10

  - id: INT-02
    description: "Every final-circuit cascade node appears in intent.circuits[]"
    rule: "{node.node_id for node in cascade if node.node_kind == 'final_circuit'} ⊆ {c.node_id for c in intent.circuits}"
    enforcement: hard_fail
    matches_inv: INV-10
    fail_message: "INT-02: final-circuit cascade node {node_id} missing from intent.circuits[]"

  - id: INT-03
    description: "Every intent.circuits[] entry has Zs-resolution helper fields populated (per refresh §1)"
    rule: |
      for each c in intent.circuits:
        c.r1_plus_r2_milliohm_per_m_at_operating_temp > 0
        AND c.reactance_milliohm_per_m >= 0
    enforcement: hard_fail
    matches_inv: INV-10
    fail_message: "INT-03: intent circuit {node_id} missing or invalid r1_plus_r2 / reactance Zs helper fields"
