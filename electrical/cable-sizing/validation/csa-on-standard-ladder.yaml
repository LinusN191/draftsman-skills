# CSA standard ladder validation
# Checked by validator INV-03

validations:
  - id: LAD-01
    description: "Every selection.phase_csa is on the IEC mm² ladder for GB/EU/INT/KE jurisdictions"
    rule: "for jurisdiction in {GB, EU, INT, KE}: phase_csa in [1.0, 1.5, 2.5, 4, 6, 10, 16, 25, 35, 50, 70, 95, 120, 150, 185, 240, 300, 400, 500, 630]"
    enforcement: hard_fail
    matches_inv: INV-03

  - id: LAD-02
    description: "Every selection.cpc_csa on the IEC mm² ladder for GB/EU/INT/KE"
    rule: "for jurisdiction in {GB, EU, INT, KE}: cpc_csa in [1.0, 1.5, 2.5, 4, 6, 10, 16, 25, 35, 50, 70, 95, 120, 150, 185, 240, 300, 400, 500, 630]"
    enforcement: hard_fail
    matches_inv: INV-03

  - id: LAD-03
    description: "Every selection.phase_csa on the AWG/kcmil ladder for US jurisdiction"
    rule: "for jurisdiction == 'US': phase_csa matches AWG ladder ['14','12','10','8','6','4','3','2','1','1/0','2/0','3/0','4/0'] OR kcmil ladder ['250','300','350','400','500','600','750','1000']"
    enforcement: hard_fail
    matches_inv: INV-03

  - id: LAD-04
    description: "parallel_count is integer in [1, 6] inclusive"
    rule: "for each node: 1 ≤ parallel_count ≤ 6"
    enforcement: hard_fail
