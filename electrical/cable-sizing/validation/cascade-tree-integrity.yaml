# Cascade tree integrity validation
# Checked by validator (cascade structural integrity)

validations:
  - id: TREE-01
    description: "All node_ids unique"
    rule: "len({n.node_id for n in cascade}) == len(cascade)"
    enforcement: hard_fail
    fail_message: "TREE-01: duplicate node_id detected — every cascade node must have a unique node_id"

  - id: TREE-02
    description: "Every non-root node's parent_node_id resolves to another node_id in cascade"
    rule: "for each non-root node: node.parent_node_id in {n.node_id for n in cascade}"
    enforcement: hard_fail
    matches_inv: INV-02
    fail_message: "TREE-02: orphan parent_node_id — node {node_id} references parent {parent_node_id} not present in cascade"

  - id: TREE-03
    description: "No cycles in parent chain"
    rule: "for each node: parent_node_id chain is acyclic (no node is its own ancestor)"
    enforcement: hard_fail
    fail_message: "TREE-03: cycle detected in cascade — node {node_id} appears in its own ancestor chain"

  - id: TREE-04
    description: "Exactly one or more root nodes (no parent_node_id field or null)"
    rule: "at least one node has no parent_node_id (root)"
    enforcement: hard_fail
    fail_message: "TREE-04: no root node found — cascade requires at least one node without parent_node_id"
