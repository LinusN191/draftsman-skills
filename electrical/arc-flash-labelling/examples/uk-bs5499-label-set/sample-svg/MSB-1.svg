<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100mm" height="75mm" viewBox="0 0 100 75">
  <title>Arc-Flash Label per BS 5499 - MSB-1</title>
  <!-- Red danger banner -->
  <rect x="0" y="0" width="100" height="12" fill="#E00034" stroke="#000000" stroke-width="0.5"/>
  <text x="50" y="8" font-family="Arial" font-size="5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DANGER</text>

  <!-- Alert triangle symbol -->
  <g transform="translate(2, 14)">
    <polygon points="10,2 18,16 2,16" fill="#FFD600" stroke="#000000" stroke-width="0.8"/>
    <path d="M 8 5 L 12 9 L 9 9 L 13 14 L 9 11 L 11 11 L 8 6 Z" fill="#000000"/>
  </g>

  <!-- Main hazard statement -->
  <text x="22" y="18" font-family="Arial" font-size="3" font-weight="bold" fill="#000000">Arc Flash and Shock Hazard</text>

  <!-- Content -->
  <text x="22" y="22" font-family="Arial" font-size="2.5" fill="#000000">Equipment: MSB-1</text>
  <text x="22" y="26" font-family="Arial" font-size="2.5" fill="#000000">Voltage: 400 V AC, 3-phase</text>
  <text x="22" y="30" font-family="Arial" font-size="2.5" fill="#000000">Incident Energy: 10.5 cal/cm² @ 450mm</text>
  <text x="22" y="34" font-family="Arial" font-size="2.5" fill="#000000">Arc Flash Boundary: 1650 mm (65 in)</text>
  <text x="22" y="42" font-family="Arial" font-size="2.5" font-weight="bold" fill="#000000">PPE Cat 3</text>
  <text x="22" y="47" font-family="Arial" font-size="1.8" fill="#000000">Arc-rated suit + hood + gloves; hard hat; safety glasses.</text>

  <!-- Footer -->
  <line x1="0" y1="58" x2="100" y2="58" stroke="#000000" stroke-width="0.3"/>
  <text x="2" y="62" font-family="Arial" font-size="1.6" fill="#000000">HSG48 voluntary best practice — not statutory</text>
  <text x="2" y="65" font-family="Arial" font-size="1.4" fill="#000000">Analysed 2026-05-17 | BuildTech Engineering Ltd</text>
</svg>
