<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100mm" height="75mm" viewBox="0 0 100 75">
  <title>Arc-Flash Label per ANSI Z535.4 - SERVICE-480V</title>
  <rect x="0" y="0" width="100" height="12" fill="#E00034" stroke="#000000" stroke-width="0.5"/>
  <text x="50" y="8" font-family="Arial" font-size="6" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DANGER</text>
  <text x="50" y="11" font-family="Arial" font-size="2.5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Arc Flash and Shock Hazard</text>

  <!-- Alert triangle symbol -->
  <g transform="translate(2, 14)">
    <polygon points="10,2 18,16 2,16" fill="#FFD600" stroke="#000000" stroke-width="0.8"/>
    <path d="M 8 5 L 12 9 L 9 9 L 13 14 L 9 11 L 11 11 L 8 6 Z" fill="#000000"/>
  </g>

  <!-- Content -->
  <text x="22" y="18" font-family="Arial" font-size="3" font-weight="bold" fill="#000000">Equipment: SERVICE-480V</text>
  <text x="22" y="22" font-family="Arial" font-size="2.5" fill="#000000">Voltage: 480 V AC, 3-phase</text>
  <text x="22" y="26" font-family="Arial" font-size="2.5" fill="#000000">Incident Energy: 12.0 cal/cm² @ 455mm</text>
  <text x="22" y="30" font-family="Arial" font-size="2.5" fill="#000000">Arc Flash Boundary: 1800 mm (71 in)</text>
  <text x="22" y="34" font-family="Arial" font-size="2.5" fill="#000000">Limited Approach (M): 3050 mm (10 ft 0 in)</text>
  <text x="22" y="38" font-family="Arial" font-size="2.5" fill="#000000">Limited Approach (F): 1070 mm (3 ft 6 in)</text>
  <text x="22" y="42" font-family="Arial" font-size="2.5" fill="#000000">Restricted Approach: 305 mm (12 in)</text>
  <text x="22" y="47" font-family="Arial" font-size="2.5" font-weight="bold" fill="#000000">PPE Category: 3</text>
  <text x="22" y="52" font-family="Arial" font-size="1.8" fill="#000000">AR suit + AR hood (ATPV ≥25 cal/cm²); AR gloves; hard hat; safety glasses.</text>

  <!-- Footer -->
  <line x1="0" y1="60" x2="100" y2="60" stroke="#000000" stroke-width="0.3"/>
  <text x="2" y="64" font-family="Arial" font-size="1.8" fill="#000000">Analysed: 2026-05-17 | Engineer: Sarah Chen, PE</text>
  <text x="2" y="67" font-family="Arial" font-size="1.8" fill="#000000">Acme Engineering LLC</text>

  <!-- QR Code placeholder -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.3"/>
    <text x="6" y="8" font-family="monospace" font-size="2" fill="#000000" text-anchor="middle">QR</text>
  </g>
</svg>
