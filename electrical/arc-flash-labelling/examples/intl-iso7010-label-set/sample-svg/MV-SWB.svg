<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100mm" height="75mm" viewBox="0 0 100 75">
  <title>Restricted Arc-Flash Label - MV-SWB</title>
  <defs>
    <!-- Diagonal stripe pattern for RESTRICTED background -->
    <pattern id="diagonal" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="4" stroke="#CCCCCC" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Purple RESTRICTED banner -->
  <rect x="0" y="0" width="100" height="12" fill="#64446E" stroke="#000000" stroke-width="0.5"/>
  <text x="50" y="8" font-family="Arial" font-size="4" font-weight="bold" fill="#FFFFFF" text-anchor="middle">RESTRICTED</text>

  <!-- Diagonal striped background -->
  <rect x="0" y="12" width="100" height="46" fill="url(#diagonal)" stroke="#000000" stroke-width="0.3"/>

  <!-- Do Not Operate symbol (prohibition circle) -->
  <g transform="translate(25, 18)">
    <circle cx="12" cy="12" r="10" fill="#64446E" stroke="#000000" stroke-width="1"/>
    <line x1="12" y1="4" x2="12" y2="20" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="4" y1="12" x2="20" y2="12" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>

  <!-- Main content -->
  <text x="50" y="28" font-family="Arial" font-size="3" font-weight="bold" fill="#64446E" text-anchor="middle">DO NOT OPERATE</text>
  <text x="50" y="32" font-family="Arial" font-size="2.2" fill="#000000" text-anchor="middle">Equipment: MV-SWB | 33 kV</text>
  <text x="50" y="36" font-family="Arial" font-size="2" fill="#000000" text-anchor="middle">Incident Energy: 47.2 cal/cm²</text>
  <text x="50" y="40" font-family="Arial" font-size="1.8" fill="#64446E" text-anchor="middle" font-weight="bold">ENERGIZED WORK PROHIBITED</text>
  <text x="50" y="45" font-family="Arial" font-size="1.6" fill="#000000" text-anchor="middle">De-energise + LOTO + Ground before approach</text>

  <!-- Footer -->
  <line x1="0" y1="58" x2="100" y2="58" stroke="#000000" stroke-width="0.3"/>
  <text x="2" y="62" font-family="Arial" font-size="1.4" fill="#000000">IE ≥ 40 cal/cm² | Restricted Override Active</text>
  <text x="2" y="65" font-family="Arial" font-size="1.4" fill="#000000">Europower Systems AG | 2026-05-17</text>

  <!-- QR Code placeholder -->
  <g transform="translate(80, 58)">
    <rect x="0" y="0" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.3"/>
    <text x="6" y="8" font-family="monospace" font-size="2" fill="#000000" text-anchor="middle">QR</text>
  </g>
</svg>
