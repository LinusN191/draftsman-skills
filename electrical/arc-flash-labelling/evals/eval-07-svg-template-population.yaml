name: eval-07-svg-template-population
skill: arc-flash-labelling
category: skill_specific
description: |
  Verify SVG content is fully populated: <svg> element present, expected template
  markers (signal-word panel, equipment-id panel, etc.), no remaining {{...}} placeholders.
  (Sub-category: svg_template_population)
input:
  reuse_from: "electrical/arc-flash-labelling/evals/eval-01-us-mixed-cascade-ansi-labels.yaml"

checks:
  # per_label_svg_validation — element_present
  - assertion: 'ir.labels[*].svg_content contains "<svg"'
    description: Every label's SVG must contain opening "<svg" tag
    severity: critical

  - assertion: 'ir.labels[*].svg_content contains "</svg>"'
    description: Every label's SVG must contain closing "</svg>" tag
    severity: critical

  # no_remaining_placeholders: true — no {{...}} strings
  - assertion: 'ir.labels[*].svg_content not_contains "{{"'
    description: No remaining Jinja-style opening placeholders {{ in any label SVG
    severity: critical

  - assertion: 'ir.labels[*].svg_content not_contains "}}"'
    description: No remaining Jinja-style closing placeholders }} in any label SVG
    severity: critical

  # has_signal_word_panel — element with appropriate fill colour observed as substring
  # NOTE: Canonical grammar can't introspect SVG DOM elements. Best-available check
  # is to verify the signal-word text appears somewhere in svg_content.
  - assertion: 'ir.labels[*].svg_content matches "(DANGER|WARNING|CAUTION|RESTRICTED)"'
    description: Every label SVG must contain a signal-word panel text (DANGER/WARNING/CAUTION/RESTRICTED)
    severity: critical

  # has_equipment_id_text — equipment_id appears as text in SVG
  # TODO: Canonical grammar cannot do per-label cross-field substring (svg_content contains <its own node_id>).
  # Logged as info placeholder pending runtime cross-field support.
  - assertion: 'ir.labels[*].svg_content != null'
    description: ALWAYS-PASS placeholder pending runtime cross-field support — svg_content is REQUIRED per labels-ir.schema.json; per-label equipment_id substring check (svg_content contains its own node_id) not enforceable by canonical grammar
    severity: info

  # has_message_panel — text elements for IE / AFB / shock / PPE
  - assertion: 'ir.labels[*].svg_content matches "(cal/cm|Category|boundary|Approach|PPE)"'
    description: Every label SVG must contain message panel text (IE / AFB / shock / PPE keywords)
    severity: critical

  # pass_criteria coverage:
  # "Every label's signal-word colour matches the format spec hex" — soft (per-format hex map),
  # not enforceable as single canonical check; runtime SVG-DOM tool required.
  # Captured as info-level placeholder pending runtime SVG-DOM colour audit.
  - assertion: 'ir.labels[*].format_applied != null'
    description: ALWAYS-PASS placeholder pending runtime SVG-DOM colour audit — format_applied is REQUIRED per labels-ir.schema.json; per-format signal-word colour spec match requires runtime SVG-DOM tooling not available in canonical grammar
    severity: info
