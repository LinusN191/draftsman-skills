name: eval-02-restricted-equipment-distinct-format
skill: arc-flash-labelling
category: edge_case
description: |
  One arc-flash node has incident_energy_cal_per_cm2 = 45 (above 40). Skill MUST use
  restricted_format with distinct purple/black banner, suppress PPE category line,
  replace with "Energized work prohibited" text.
input:
  jurisdiction: US
  consumed_intents:
    arc_flash: { present: true, fabricated_nodes: [
      { node_id: "MV-SERVICE", incident_energy_cal_per_cm2: 45.0, arc_flash_boundary_mm: 3500, ppe_category: null, label_recommended: true, voltage_v: 12470, designation: "12.47kV service entrance" }
    ]}
  project_metadata:
    company_name: "Acme Engineering LLC"
    qualified_person: "Sarah Chen, PE"

checks:
  # per_label[0] — MV-SERVICE
  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].format_applied == "restricted_format"'
    description: MV-SERVICE label uses restricted_format (auto-override despite US jurisdiction)
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].format_source == "restricted_override"'
    description: MV-SERVICE format_source records restricted_override path
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].signal_word == "RESTRICTED"'
    description: MV-SERVICE signal word is RESTRICTED (not DANGER even though IE > 8)
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].ppe_category == null'
    description: MV-SERVICE ppe_category is null (no Cat 5 for IE > 40)
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].label_content contains "RESTRICTED"'
    description: MV-SERVICE label content must include "RESTRICTED"
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].label_content contains "Energized work prohibited"'
    description: MV-SERVICE label content must include "Energized work prohibited"
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].label_content contains "12.47kV"'
    description: MV-SERVICE label content must include voltage 12.47kV
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].label_content contains "45 cal/cm²"'
    description: MV-SERVICE label content must include incident energy 45 cal/cm²
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].svg_content contains "#64446E"'
    description: MV-SERVICE SVG must contain purple banner colour #64446E
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].svg_content not_contains "#E00034"'
    description: MV-SERVICE SVG must NOT contain DANGER red #E00034
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].svg_content not_contains "#F28900"'
    description: MV-SERVICE SVG must NOT contain WARNING orange #F28900
    severity: critical

  # non_compliance_flags_must_include
  - assertion: 'ir.flags contains "RESTRICTED"'
    description: Compliance flag matching "RESTRICTED" must be emitted at warning severity
    severity: warning

  # pass_criteria coverage:
  # "DO NOT OPERATE overlay present" — testable as SVG/label_content substring
  - assertion: 'ir.labels[?(@.node_id=="MV-SERVICE")].label_content contains "DO NOT OPERATE"'
    description: MV-SERVICE label must include "DO NOT OPERATE" overlay text
    severity: warning
