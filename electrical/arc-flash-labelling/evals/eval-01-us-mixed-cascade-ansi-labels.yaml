name: eval-01-us-mixed-cascade-ansi-labels
skill: arc-flash-labelling
category: happy_path
description: |
  US 480V industrial cascade with 5 nodes mixing PPE Cat 1-3. ANSI Z535.4 auto-selected
  via jurisdiction default. All NFPA 70E §130.5(H) required fields populated. Demonstrates
  baseline happy-path label generation.
input:
  jurisdiction: US
  consumed_intents:
    arc_flash: { present: true, source: "electrical/arc-flash/examples/us-pv-with-dcfc/intent-out.json" }
  project_metadata:
    company_name: "Acme Engineering LLC"
    qualified_person: "Sarah Chen, PE"
    qr_code_base_url: "https://example.com/arc-flash/projects/us-ind"
    default_label_size_mm: { width: 100, height: 75 }

checks:
  # ir_structural.labels_count
  - assertion: 'ir.labels.length == 4'
    description: Expected 4 labels emitted (PV string skipped per label_recommended=false)
    severity: critical

  # ir_structural.flags_must_include
  - assertion: 'ir.flags contains "TOOL-CALL-PENDING-FOR-PDF-PNG"'
    description: Output must include TOOL-CALL-PENDING-FOR-PDF-PNG flag
    severity: critical

  # ir_structural.jurisdiction
  - assertion: 'ir.jurisdiction == "US"'
    description: Jurisdiction must be US
    severity: critical

  # per_label[0] — SERVICE-480V
  - assertion: 'ir.labels[?(@.node_id=="SERVICE-480V")].format_applied == "ansi_z535_4"'
    description: SERVICE-480V label uses ANSI Z535.4 format
    severity: critical
    standard_ref: ANSI Z535.4

  - assertion: 'ir.labels[?(@.node_id=="SERVICE-480V")].signal_word == "DANGER"'
    description: SERVICE-480V signal word is DANGER per ANSI Z535.4
    severity: critical
    standard_ref: ANSI Z535.4

  - assertion: 'ir.labels[?(@.node_id=="SERVICE-480V")].label_content contains "480V"'
    description: SERVICE-480V label content must include voltage 480V
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="SERVICE-480V")].label_content contains "12.0 cal/cm²"'
    description: SERVICE-480V label content must include incident energy 12.0 cal/cm²
    severity: critical

  - assertion: 'ir.labels[?(@.node_id=="SERVICE-480V")].label_content contains "Category 3"'
    description: SERVICE-480V label content must include PPE Category 3
    severity: critical

  # per_label[1] — PV-INV-1
  - assertion: 'ir.labels[?(@.node_id=="PV-INV-1")].format_applied == "ansi_z535_4"'
    description: PV-INV-1 label uses ANSI Z535.4 format
    severity: critical
    standard_ref: ANSI Z535.4

  - assertion: 'ir.labels[?(@.node_id=="PV-INV-1")].signal_word matches "^(DANGER|WARNING)$"'
    description: PV-INV-1 signal word is DANGER or WARNING (depends on IE threshold)
    severity: critical

  # rationale.sections_count
  - assertion: 'ir.rationale.sections.length == 8'
    description: Exactly 8 rationale sections expected per WI2
    severity: critical

  # rationale.chat_summary_max_chars
  - assertion: 'ir.rationale.chat_summary.length <= 500'
    description: Chat summary must be ≤ 500 chars
    severity: warning

  # invariants_pass
  - assertion: 'ir.invariants.INV-01.passes == true'
    description: Invariant INV-01 must pass
    severity: critical
    matches_inv: INV-01

  - assertion: 'ir.invariants.INV-02.passes == true'
    description: Invariant INV-02 must pass
    severity: critical
    matches_inv: INV-02

  - assertion: 'ir.invariants.INV-03.passes == true'
    description: Invariant INV-03 must pass
    severity: critical
    matches_inv: INV-03

  - assertion: 'ir.invariants.INV-04.passes == true'
    description: Invariant INV-04 must pass
    severity: critical
    matches_inv: INV-04

  - assertion: 'ir.invariants.INV-05.passes == true'
    description: Invariant INV-05 must pass
    severity: critical
    matches_inv: INV-05

  - assertion: 'ir.invariants.INV-06.passes == true'
    description: Invariant INV-06 must pass
    severity: critical
    matches_inv: INV-06

  - assertion: 'ir.invariants.INV-07.passes == true'
    description: Invariant INV-07 must pass
    severity: critical
    matches_inv: INV-07

  - assertion: 'ir.invariants.INV-08.passes == true'
    description: Invariant INV-08 must pass
    severity: critical
    matches_inv: INV-08

  # pass_criteria coverage (Bucket 2 — new mechanically-testable claims):
  # "Every label has tool_call_pending_for_pdf_png: true" — emit cross-cutting check
  - assertion: 'ir.labels[*].tool_call_pending_for_pdf_png all_equal true'
    description: Every label must have tool_call_pending_for_pdf_png set to true
    severity: critical

  # "SVG content non-empty + no template placeholders remaining"
  - assertion: 'ir.labels[*].svg_content not_contains "{{"'
    description: No remaining Jinja-style placeholders in any label SVG
    severity: critical
